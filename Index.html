 :root {

 body {

 .dashboard-container {
 max-width: 1200px;
 margin: 0 auto;
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
 gap: 20px;
 }
 .card {
 background-color: var(--card-bg);
 padding: 20px;
 border-radius: 8px;
