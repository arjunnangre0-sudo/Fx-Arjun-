<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V9.1 MASTER TERMINAL</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #030303; --gold: #d4af37; --border: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .workspace { flex: 1; display: flex; flex-direction: column; }
        .toolbar-top { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        
        #chart { flex: 1; position: relative; }
        
        /* Replay Control Styling */
        .replay-controls { background: #111; padding: 5px 15px; border-radius: 4px; display: flex; gap: 15px; align-items: center; }
        .replay-btn { color: #aaa; cursor: pointer; border: none; background: none; font-size: 14px; }
        .replay-btn:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="workspace">
        <div class="toolbar-top">
            <h3 style="color:var(--gold);">XAUUSD</h3>
            <div class="replay-controls">
                <button class="replay-btn" onclick="initReplay()"><i class="fa-solid fa-backward-step"></i> REPLAY</button>
                <button class="replay-btn" id="play-pause" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                <button class="replay-btn" onclick="endReplay()"><i class="fa-solid fa-square"></i> STOP</button>
            </div>
        </div>
        <div id="chart"></div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#030303', textColor: '#ccc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } }
        });
        const series = chart.addCandlestickSeries({ upColor: '#089981', downColor: '#f23645' });

        // Historical Data for Replay
        const allData = []; // Imagine 1000 candles here
        let replayIndex = 0;
        let isPlaying = false;
        let replayTimer = null;

        function initReplay() {
            replayIndex = 50; // Start back in time
            series.setData(allData.slice(0, replayIndex));
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('play-pause').innerHTML = isPlaying ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
            if(isPlaying) {
                replayTimer = setInterval(() => {
                    if(replayIndex < allData.length) {
                        series.update(allData[replayIndex]);
                        replayIndex++;
                    }
                }, 500);
            } else {
                clearInterval(replayTimer);
            }
        }

        function endReplay() {
            clearInterval(replayTimer);
            isPlaying = false;
            series.setData(allData); // Show all data
            alert("Replay Ended. Opening MTJ Dashboard...");
        }
    </script>
</body>
</html>
