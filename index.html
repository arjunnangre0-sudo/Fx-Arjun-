<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | APEX CORE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- INSTITUTIONAL DESIGN SYSTEM --- */
        :root {
            --bg-base: #000000;
            --bg-panel: #0B0E14;
            --bg-hover: #1A202C;
            --border-dim: #1F2533;
            --text-main: #E2E8F0;
            --text-dim: #718096;
            --neon-buy: #00C087;
            --neon-sell: #F6465D;
            --gold: #F0B90B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { height: 45px; background: var(--bg-panel); border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; padding: 0 20px; font-size: 12px; z-index: 100; }

        /* APP WRAPPER */
        .app-wrapper { flex: 1; display: flex; height: calc(100vh - 45px); }

        /* LEFT NAVIGATION */
        .left-nav { width: 65px; background: var(--bg-panel); border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-icon { width: 42px; height: 42px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-dim); transition: 0.2s; font-size: 18px; }
        .nav-icon.active { background: rgba(240, 185, 11, 0.1); color: var(--gold); border-left: 3px solid var(--gold); }

        /* WORKSPACE */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .page { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; overflow-y: auto; padding: 30px; }
        .page.active { display: block; }

        /* ANALYTICS GRID */
        .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--bg-panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border-dim); }

        /* TERMINAL CONTAINER */
        .terminal-container { width: 100%; height: 700px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-dim); background: #000; }
        
        /* TABLE STYLING */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { color: var(--text-dim); text-align: left; padding: 12px; font-size: 11px; border-bottom: 1px solid var(--border-dim); }
        .data-table td { padding: 15px 12px; font-family: 'JetBrains Mono'; font-size: 13px; border-bottom: 1px solid #141a22; }
    </style>
</head>
<body>

    <header class="header">
        <div style="color:var(--gold); font-weight:800; letter-spacing: 0.5px;">FX_ARJUN APEX CORE v1.0</div>
    </header>

    <div class="app-wrapper">
        <nav class="left-nav">
            <div class="nav-icon active" onclick="showPage('dash')">📊</div>
            <div class="nav-icon" onclick="showPage('terminal')">⚡</div>
            <div class="nav-icon" onclick="showPage('hist')">📜</div>
        </nav>

        <main class="content-area">
            <section id="dash" class="page active">
                <div class="analytics-grid">
                    <div class="card">Equity <div style="font-size:20px; font-weight:700;">$24,500.00</div></div>
                    <div class="card">Profit <div style="font-size:20px; font-weight:700; color:var(--neon-buy);">+$1,240.50</div></div>
                    <div class="card">Win Rate <div style="font-size:20px; font-weight:700;">78.4%</div></div>
                    <div class="card">Margin <div style="font-size:20px; font-weight:700;">3250%</div></div>
                </div>
                
                <div class="terminal-container">
                    <iframe src="https://metatraderweb.app/v5/terminal?servers=*&trade=1&demo=1&lang=en" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </section>

            <section id="hist" class="page">
                <div class="card">
                    <h3>Trade Ledger</h3>
                    <table class="data-table">
                        <thead>
                            <tr><th>Asset</th><th>Type</th><th>Entry</th><th>Result</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>XAUUSD</td><td>BUY</td><td>2345.20</td><td style="color:var(--neon-buy)">+$420</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
