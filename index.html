<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.33 CORE CHART ENGINE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root {
            --bg-primary: #030303;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --tool-bg: #0a0a0a;
            --tool-hover: #1f1f1f;
            --profit-green: #089981;
            --loss-red: #f23645;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Top Toolbar */
        .top-bar { 
            height: 60px; background-color: #050505; border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; padding: 0 20px; gap: 20px; z-index: 10;
        }
        
        .brand { font-size: 20px; font-weight: 900; color: var(--gold-accent); letter-spacing: 2px; border-right: 1px solid var(--border-color); padding-right: 20px; }
        .pair-status { font-size: 11px; background: rgba(8, 153, 129, 0.1); color: var(--profit-green); padding: 4px 8px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(8, 153, 129, 0.2); }

        /* Custom Drawing Settings */
        .tool-settings { display: flex; align-items: center; gap: 15px; margin-left: auto; background: #111; padding: 6px 15px; border-radius: 6px; border: 1px solid #222;}
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
        input[type="color"] { background: transparent; border: 1px solid var(--border-color); border-radius: 4px; width: 28px; height: 28px; cursor: pointer; padding: 1px; }
        input[type="range"] { accent-color: var(--gold-accent); width: 80px; cursor: pointer; }

        /* Main Workspace */
        .main-workspace { flex: 1; display: flex; position: relative; }

        /* Left Toolbar */
        .left-toolbar { 
            width: 55px; background-color: var(--tool-bg); border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 8px; z-index: 10;
        }
        
        .tool-icon { 
            width: 38px; height: 38px; color: #666; border-radius: 6px; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; transition: 0.2s; font-size: 16px; border: 1px solid transparent; 
        }
        .tool-icon:hover { color: #fff; background: var(--tool-hover); }
        .tool-icon.active { color: var(--gold-accent); background: rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.3); }
        .tool-divider { width: 24px; height: 1px; background: var(--border-color); margin: 5px 0; }

        /* Chart Area */
        .chart-wrapper { flex: 1; position: relative; overflow: hidden; }
        
        #lw-chart { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* The Magic Overlay Canvas for Drawings */
        #drawing-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; 
            pointer-events: none; /* Default to none, enabled when drawing */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">FX_ARJUN</div>
        <div style="font-weight: 800; font-size: 16px;">XAUUSD</div>
        <div class="pair-status">LIVE TICK</div>

        <div class="tool-settings">
            <div class="setting-group">
                Color
                <input type="color" id="tool-color" value="#d4af37">
            </div>
            <div class="setting-group">
                Opacity (Fill)
                <input type="range" id="tool-opacity" min="0" max="100" value="20">
            </div>
        </div>
    </div>

    <div class="main-workspace">
        
        <div class="left-toolbar">
            <div class="tool-icon active" onclick="setTool('cursor')" title="Cursor / Pan Chart"><i class="fa-solid fa-hand"></i></div>
            <div class="tool-divider"></div>
            <div class="tool-icon" onclick="setTool('trendline')" title="Trend Line"><i class="fa-solid fa-minus" style="transform: rotate(-45deg);"></i></div>
            <div class="tool-icon" onclick="setTool('rectangle')" title="Rectangle / Zone"><i class="fa-regular fa-square"></i></div>
            <div class="tool-divider"></div>
            <div class="tool-icon" onclick="setTool('long')" title="Long Position (RR)"><i class="fa-solid fa-arrow-trend-up"></i></div>
            <div class="tool-icon" onclick="setTool('short')" title="Short Position (RR)"><i class="fa-solid fa-arrow-trend-down"></i></div>
            <div class="tool-divider"></div>
            <div class="tool-icon" onclick="clearDrawings()" title="Clear Drawings"><i class="fa-solid fa-trash"></i></div>
        </div>

        <div class="chart-wrapper" id="chart-wrapper">
            <div id="lw-chart"></div>
            <canvas id="drawing-canvas"></canvas>
        </div>

    </div>

    <script>
        // --- 1. LIGHTWEIGHT CHART SETUP ---
        const chartContainer = document.getElementById('lw-chart');
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { backgroundColor: '#030303', textColor: '#777777', fontFamily: "'Inter', sans-serif" },
            grid: { vertLines: { color: '#111111' }, horzLines: { color: '#111111' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#1a1a1a' },
            timeScale: { borderColor: '#1a1a1a', timeVisible: true }
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#089981', downColor: '#f23645', borderVisible: false, wickUpColor: '#089981', wickDownColor: '#f23645'
        });

        // Generate Chart Data
        const chartData = [];
        let price = 2320.50;
        let time = new Date('2026-06-01T00:00:00Z').getTime() / 1000;
        for (let i = 0; i < 200; i++) {
            let open = price;
            let close = open + (Math.random() * 6 - 3);
            let high = Math.max(open, close) + (Math.random() * 2);
            let low = Math.min(open, close) - (Math.random() * 2);
            chartData.push({ time, open, high, low, close });
            price = close;
            time += 15 * 60; 
        }
        candleSeries.setData(chartData);

        // Live Tick Simulator
        setInterval(() => {
            let last = chartData[chartData.length - 1];
            let tick = (Math.random() * 0.4 - 0.2);
            last.close += tick;
            if(last.close > last.high) last.high = last.close;
            if(last.close < last.low) last.low = last.close;
            candleSeries.update(last);
        }, 200);

        // --- 2. CUSTOM CANVAS DRAWING ENGINE ---
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('chart-wrapper');
        
        let currentTool = 'cursor';
        let isDrawing = false;
        let drawings = [];
        let activeDrawing = null;

        // Sync Canvas size with Chart
        function resizeEngine() {
            chart.applyOptions({ width: wrapper.clientWidth, height: wrapper.clientHeight });
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            renderDrawings();
        }
        window.addEventListener('resize', resizeEngine);
        setTimeout(resizeEngine, 100);

        // Sync Drawings when chart pans or zooms
        chart.timeScale().subscribeVisibleLogicalRangeChange(() => renderDrawings());
        chart.subscribeCrosshairMove(() => renderDrawings());

        // Tool Selection
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-icon').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Magic Trick: If Cursor, let chart handle mouse. Else, canvas handles mouse.
            if(tool === 'cursor') {
                canvas.style.pointerEvents = 'none';
            } else {
                canvas.style.pointerEvents = 'auto';
                canvas.style.cursor = 'crosshair';
            }
        }

        function clearDrawings() {
            drawings = [];
            renderDrawings();
        }

        // Hex to RGBA for Opacity
        function getFillColor() {
            let hex = document.getElementById('tool-color').value;
            let op = document.getElementById('tool-opacity').value / 100;
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${op})`;
        }

        // Mouse Events on Canvas
        canvas.addEventListener('mousedown', e => {
            if(currentTool === 'cursor') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Convert pixel to Logical Time Index and Real Price
            const logicalTime = chart.timeScale().coordinateToLogical(x);
            const realPrice = candleSeries.coordinateToPrice(y);

            isDrawing = true;
            activeDrawing = {
                type: currentTool,
                l1: logicalTime, p1: realPrice,
                l2: logicalTime, p2: realPrice,
                color: document.getElementById('tool-color').value,
                fill: getFillColor()
            };
        });

        canvas.addEventListener('mousemove', e => {
            if(!isDrawing || !activeDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            activeDrawing.l2 = chart.timeScale().coordinateToLogical(x);
            activeDrawing.p2 = candleSeries.coordinateToPrice(y);
            renderDrawings();
        });

        canvas.addEventListener('mouseup', () => {
            if(!isDrawing) return;
            isDrawing = false;
            drawings.push(activeDrawing);
            activeDrawing = null;
            setTool('cursor'); // Auto switch to cursor after drawing
            document.querySelectorAll('.tool-icon')[0].classList.add('active'); // highlight cursor icon
            renderDrawings();
        });

        // The Master Renderer
        function renderDrawings() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawings.forEach(d => drawShape(d));
            if(activeDrawing) drawShape(activeDrawing);
        }

        function drawShape(d) {
            // Convert Logical Data back to Pixels on the screen
            let x1 = chart.timeScale().logicalToCoordinate(d.l1);
            let y1 = candleSeries.priceToCoordinate(d.p1);
            let x2 = chart.timeScale().logicalToCoordinate(d.l2);
            let y2 = candleSeries.priceToCoordinate(d.p2);

            // Don't draw if coords are completely out of bounds or invalid
            if(x1 === null || y1 === null || x2 === null || y2 === null) return;

            ctx.lineWidth = 2;
            ctx.strokeStyle = d.color;

            if (d.type === 'trendline') {
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            } 
            else if (d.type === 'rectangle') {
                ctx.fillStyle = d.fill;
                ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
                ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            }
            else if (d.type === 'long' || d.type === 'short') {
                // RR ORIGINAL MATH
                let width = x2 - x1;
                let dist = Math.abs(y1 - y2); // Drag distance dictates target size
                
                let targetY, stopY;
                
                if (d.type === 'long') {
                    targetY = y1 - dist;       // Target is UP
                    stopY = y1 + (dist / 2);   // Stop is DOWN (1:2 ratio)
                    
                    // Draw Green Target Box
                    ctx.fillStyle = 'rgba(8, 153, 129, 0.3)'; ctx.strokeStyle = '#089981';
                    ctx.fillRect(x1, targetY, width, dist); ctx.strokeRect(x1, targetY, width, dist);
                    
                    // Draw Red Stop Box
                    ctx.fillStyle = 'rgba(242, 54, 69, 0.3)'; ctx.strokeStyle = '#f23645';
                    ctx.fillRect(x1, y1, width, dist / 2); ctx.strokeRect(x1, y1, width, dist / 2);
                } 
                else { // Short
                    targetY = y1 + dist;       // Target is DOWN
                    stopY = y1 - (dist / 2);   // Stop is UP (1:2 ratio)
                    
                    // Draw Green Target Box
                    ctx.fillStyle = 'rgba(8, 153, 129, 0.3)'; ctx.strokeStyle = '#089981';
                    ctx.fillRect(x1, y1, width, dist); ctx.strokeRect(x1, y1, width, dist);
                    
                    // Draw Red Stop Box
                    ctx.fillStyle = 'rgba(242, 54, 69, 0.3)'; ctx.strokeStyle = '#f23645';
                    ctx.fillRect(x1, stopY, width, dist / 2); ctx.strokeRect(x1, stopY, width, dist / 2);
                }

                // Entry Line
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y1);
                ctx.strokeStyle = '#ffffff'; ctx.stroke();

                // Text Labels
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px Inter'; ctx.textAlign = 'center';
                let midX = x1 + width / 2;
                ctx.fillText('TARGET', midX, targetY + (d.type==='long' ? 15 : -5));
                ctx.fillText('STOP', midX, stopY + (d.type==='long' ? -5 : 15));
            }
        }
    </script>
</body>
</html>
