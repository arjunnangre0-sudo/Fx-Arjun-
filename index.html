<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V8.0 LIVE TERMINAL</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; }
        .terminal { display: flex; height: 100vh; }
        #chart-container { flex: 1; height: 100%; position: relative; }
        
        /* Execution Sidebar */
        .sidebar-exec { width: 250px; background: #0a0a0a; border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .status-box { background: #1a1a1a; padding: 10px; border-radius: 5px; text-align: center; color: #d4af37; font-size: 12px; }
        .btn-trade { padding: 15px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="chart-container"></div>

    <div class="sidebar-exec">
        <h3 style="color:#fff;">Order Panel</h3>
        <div id="account-status" class="status-box">Checking Account...</div>
        
        <button class="btn-trade" style="background:#089981; color:#fff;" onclick="placeTrade('BUY')">BUY (MARKET)</button>
        <button class="btn-trade" style="background:#f23645; color:#fff;" onclick="placeTrade('SELL')">SELL (MARKET)</button>
        
        <p style="color:#666; font-size:11px;">*Live XAUUSD Feed Active</p>
    </div>
</div>

<script type="text/javascript">
    // Load Chart
    new TradingView.widget({
        "container_id": "chart-container",
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "theme": "dark",
        "autosize": true,
        "show_popup_button": true,
        "hide_side_toolbar": false
    });

    // Account Logic
    const userBalance = 0; // Yahan tumhara balance fetch hoga
    const statusBox = document.getElementById('account-status');

    if(userBalance <= 0) {
        statusBox.innerHTML = "⚠️ Please Connect Your Trading Account";
        statusBox.style.background = "#440000";
        statusBox.style.color = "#ff4444";
    } else {
        statusBox.innerHTML = "Account Connected | Balance: $" + userBalance;
    }

    function placeTrade(type) {
        if(userBalance <= 0) {
            alert("Trade failed: Please connect your trading account with valid capital.");
        } else {
            alert(type + " order placed!");
        }
    }
</script>

</body>
</html>
