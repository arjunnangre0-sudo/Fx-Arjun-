<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V5.0 MASTER TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================================
           GLOBAL VARIABLES & COLOR PALETTE
           ========================================= */
        :root {
            --bg-primary: #030303;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.9);
            --font-family: 'Inter', sans-serif;
            --transition-speed: 0.3s;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: var(--font-family); 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* =========================================
           LAYER 1: AUTHENTICATION GATE
           ========================================= */
        #auth-gate {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: radial-gradient(circle at center, #0f1218 0%, #000 100%);
            z-index: 100000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        .login-box {
            background: var(--bg-card); 
            border: 1px solid var(--border-color);
            padding: 60px 50px; 
            border-radius: 12px; 
            text-align: center; 
            width: 100%; 
            max-width: 450px;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.05);
        }
        
        .login-box h1 { 
            color: var(--gold-accent); 
            margin-bottom: 15px; 
            font-weight: 900; 
            font-size: 32px; 
            letter-spacing: 2px; 
        }

        .login-box p { 
            color: var(--text-dim); 
            font-size: 14px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .btn-google {
            width: 100%; 
            padding: 16px; 
            background: #ffffff; 
            color: #000000; 
            font-weight: 700;
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 25px; 
            font-size: 15px; 
            transition: var(--transition-speed);
        }

        .btn-google:hover { 
            background: #f0f0f0; 
            transform: translateY(-2px); 
        }

        .btn-google:active {
            transform: scale(0.96);
        }
        
        .btn-mgmt {
            width: 100%; 
            padding: 16px; 
            background: transparent; 
            color: var(--gold-accent);
            border: 1px dashed var(--gold-accent); 
            font-weight: 700; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition-speed); 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .btn-mgmt:hover { 
            background: rgba(212, 175, 55, 0.1); 
        }

        .btn-mgmt:active {
            transform: scale(0.96);
        }

        /* =========================================
           LAYER 2: PROFILE PAGE OVERLAY
           ========================================= */
        #profile-page {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(10px); 
            z-index: 99999; 
            padding: 60px; 
            overflow-y: auto; 
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn { 
            from { transform: scale(1.05); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }

        .profile-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 50px; 
            box-shadow: var(--card-shadow); 
        }

        .profile-header { 
            display: flex; 
            align-items: center; 
            gap: 50px; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 50px; 
            margin-bottom: 50px; 
        }

        .large-avatar { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            border: 4px solid var(--gold-accent); 
            background-color: #050505; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15); 
        }

        .large-avatar img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .trader-title h1 { 
            font-size: 56px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            letter-spacing: -2px; 
            margin-bottom: 15px; 
        }

        .trader-badge { 
            display: inline-block; 
            background: rgba(212, 175, 55, 0.1); 
            color: var(--gold-accent); 
            padding: 8px 20px; 
            border-radius: 30px; 
            font-size: 13px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
        }
        
        .detail-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
        }

        .detail-card { 
            background-color: #050505; 
            border: 1px solid var(--border-color); 
            padding: 35px; 
            border-radius: 12px; 
            transition: var(--transition-speed); 
        }

        .detail-card:hover { 
            border-color: var(--gold-accent); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .detail-card label { 
            display: block; 
            color: var(--text-dim); 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 15px; 
            font-weight: 700; 
        }

        .detail-card span { 
            font-size: 20px; 
            font-weight: 700; 
            color: var(--text-main); 
        }
        
        .back-btn { 
            margin-top: 60px; 
            background: transparent; 
            border: 1px solid var(--gold-accent); 
            color: var(--gold-accent); 
            padding: 18px 50px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: var(--transition-speed); 
            font-size: 14px; 
            letter-spacing: 1px; 
        }

        .back-btn:hover { 
            background-color: var(--gold-accent); 
            color: #000; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
        }

        /* =========================================
           LAYER 3: SIDEBAR NAVIGATION
           ========================================= */
        .sidebar { 
            width: 300px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10; 
        }

        .brand-section h1 { 
            font-size: 28px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            text-align: center; 
            letter-spacing: 3px; 
            margin-bottom: 50px; 
        }

        .nav-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex: 1; 
        }

        .nav-btn { 
            padding: 16px 20px; 
            color: var(--text-dim); 
            border: 1px solid transparent; 
            background: transparent; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition-speed); 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
        }

        .nav-btn:hover { 
            border-color: var(--border-color); 
            color: var(--gold-accent); 
            background: rgba(255, 255, 255, 0.02); 
        }

        .nav-btn.active { 
            border-color: var(--gold-accent); 
            color: var(--text-main); 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); 
            border-left: 4px solid var(--gold-accent); 
        }
        
        #mgmt-nav-btn { 
            display: none; 
            margin-top: 20px; 
            border: 1px dashed var(--loss-red); 
            color: var(--loss-red); 
            background: rgba(255, 68, 68, 0.05); 
        }

        .sidebar-footer { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-align: center; 
            letter-spacing: 1.5px; 
            border-top: 1px solid var(--border-color); 
            padding-top: 25px; 
            line-height: 1.8; 
            font-weight: 600; 
        }

        /* =========================================
           LAYER 4: MAIN WORKSPACE
           ========================================= */
        .workspace { 
            flex: 1; 
            padding: 30px 50px 50px 50px; 
            overflow-y: auto; 
            background: radial-gradient(circle at top right, #0a0c10 0%, var(--bg-primary) 80%); 
        }

        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 25px; 
            margin-bottom: 40px; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .auth-controls { 
            display: flex; 
            gap: 15px; 
        }

        .login-btn { 
            background: #fff; 
            color: #000; 
            font-weight: 700; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 13px; 
            transition: 0.3s; 
        }

        .login-btn:hover { 
            opacity: 0.9; 
        }

        .login-btn:active {
            transform: scale(0.95);
        }
        
        .profile-widget { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            padding: 10px 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-card); 
            transition: var(--transition-speed); 
        }

        .profile-widget:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: var(--gold-accent); 
        }

        .profile-info { 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 800; 
            color: var(--text-main); 
            letter-spacing: 0.5px; 
        }

        .profile-status { 
            font-size: 11px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 6px; 
            margin-top: 4px; 
            font-weight: 600; 
        }

        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--loss-red); 
            border-radius: 50%; 
            box-shadow: 0 0 10px var(--loss-red); 
        }

        .status-dot.online { 
            background: var(--profit-green); 
            box-shadow: 0 0 10px var(--profit-green); 
        }
        
        .profile-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #000; 
            border: 1px solid var(--gold-accent); 
            color: var(--gold-accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 13px; 
            overflow: hidden;
        }

        .profile-avatar img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* =========================================
           UI MODULES & PAGES
           ========================================= */
        .page { 
            display: none; 
            animation: fadeIn 0.4s ease-out forwards; 
        }

        .page.active { 
            display: block; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .boundary-box { 
            border: 1px solid var(--border-color); 
            background-color: var(--bg-card); 
            padding: 35px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            box-shadow: var(--card-shadow); 
        }

        .header-label { 
            color: var(--gold-accent); 
            font-size: 12px; 
            text-transform: uppercase; 
            margin-bottom: 25px; 
            letter-spacing: 2.5px; 
            font-weight: 800; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 15px; 
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 24px; 
            margin-bottom: 30px; 
        }

        .stat-card { 
            border: 1px solid var(--border-color); 
            background-color: var(--bg-card); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            transition: var(--transition-speed); 
        }

        .stat-card:hover { 
            border-color: rgba(212, 175, 55, 0.3); 
            transform: translateY(-3px); 
        }

        .stat-card .label { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 700; 
        }

        .stat-value { 
            font-size: 28px; 
            font-weight: 800; 
            margin-top: 15px; 
            letter-spacing: -1px; 
        }

        .stat-sub { 
            font-size: 12px; 
            color: var(--gold-accent); 
            margin-top: 8px; 
            font-weight: 600; 
        }

        .dashboard-split { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 30px; 
        }

        .flex-col { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        }
        
        #tv-custom-chart-anchor { 
            width: 100%; 
            height: 600px; 
            background-color: #000; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            overflow: hidden; 
            position: relative; 
        }

        .calculator-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            margin-bottom: 20px; 
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .input-group label { 
            font-size: 12px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 700; 
        }

        .input-field { 
            background-color: #050505; 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            padding: 16px; 
            font-size: 15px; 
            border-radius: 8px; 
            outline: none; 
            transition: var(--transition-speed); 
        }

        .input-field:focus { 
            border-color: var(--gold-accent); 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); 
        }
        
        .action-btn { 
            grid-column: span 2; 
            background-color: var(--gold-accent); 
            color: #000; 
            font-weight: 800; 
            border: none; 
            padding: 18px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition-speed); 
            margin-top: 15px; 
        }

        .action-btn:hover { 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
            transform: translateY(-2px); 
        }
        
        .action-btn:active {
            transform: scale(0.98);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }

        th { 
            padding: 18px 15px; 
            color: var(--text-dim); 
            font-size: 12px; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--border-color); 
            letter-spacing: 1px; 
        }

        td { 
            padding: 18px 15px; 
            font-size: 14px; 
            border-bottom: 1px solid #111; 
            font-weight: 600; 
        }
        
        .cli-window { 
            background: #000; 
            padding: 25px; 
            border-radius: 8px; 
            border: 1px solid #222; 
            font-family: 'Courier New', Courier, monospace; 
            color: #00ff88; 
            height: 350px; 
            overflow-y: auto; 
            line-height: 1.6; 
            font-size: 14px; 
        }
    </style>
</head>
<body>

        <div class="login-box">
            <h1>FX_ARJUN</h1>
            <p>INSTITUTIONAL ALGO ENGINE V5.0</p>
            
            <button class="btn-google" id="gate-google-login">
