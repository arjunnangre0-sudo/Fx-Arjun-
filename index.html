<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | MASTER TERMINAL V8.0</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <style>
        /* [1500+ Line Structure: Start of Core CSS Engine] */
        :root { --bg: #020202; --panel: #08080a; --gold: #d4af37; --border: #1f1f26; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; }
        
        /* SIDEBAR COMPONENT */
        .sidebar { width: 300px; background: #050505; border-right: 1px solid var(--border); padding: 40px 20px; }
        .nav-link { color: #888; padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .nav-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

        /* WORKSPACE COMPONENT */
        .workspace { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* REPLAY BAR COMPONENT */
        .replay-bar { background: var(--panel); padding: 20px; border: 1px solid var(--gold); border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; }
        
        /* RISK MATRIX COMPONENT */
        .input-group { margin-bottom: 20px; }
        .input-field { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; }
        
        /* TERMINAL COMPONENT */
        .term-box { height: 200px; background: #000; border: 1px solid var(--border); padding: 20px; font-family: monospace; overflow-y: scroll; }
        
        /* TABLE COMPONENT */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 20px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1 style="color:var(--gold); margin-bottom:40px;">FX_ARJUN</h1>
        <div class="nav-link active" onclick="nav('dash')">DASHBOARD</div>
        <div class="nav-link" onclick="nav('live')">LIVE ENGINE</div>
        <div class="nav-link" onclick="nav('risk')">RISK MATRIX</div>
        <div class="nav-link" onclick="nav('mt5')">MT5 SYNC</div>
    </aside>

    <main class="workspace">
        <div id="dash" class="page active">
            <h1>SYSTEM DASHBOARD</h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px; margin-top:30px;">
                <div class="panel">Equity: $24,500</div>
                <div class="panel">Win Rate: 78%</div>
                <div class="panel">Status: Online</div>
            </div>
        </div>

        <div id="live" class="page">
            <div class="replay-bar">
                <input type="date" id="r-date" class="input-field">
                <button onclick="runReplay()" style="padding:10px 20px; background:var(--gold);">PLAY REPLAY</button>
            </div>
            <div id="tv-container" style="height:400px; border:1px solid var(--border);"></div>
            <div class="term-box" id="logs">
                <div>[SYS] Titan V8.0 Loaded...</div>
            </div>
        </div>

        <div id="risk" class="page">
            <h2>RISK CALCULATOR</h2>
            <div class="input-group"><input type="number" id="bal" placeholder="Account Balance"></div>
            <div class="input-group"><input type="number" id="sl" placeholder="SL Pips"></div>
            <button onclick="calc()" style="padding:15px; width:100%; background:var(--gold);">EXECUTE</button>
            <div id="res" style="margin-top:20px; font-size:20px;"></div>
        </div>

        <div id="mt5" class="page">
            <h2>MT5 ACCOUNT SYNC</h2>
            <div class="input-group"><input type="text" placeholder="Account ID"></div>
            <div class="input-group"><input type="password" placeholder="Investor Password"></div>
            <button onclick="alert('Connecting to Server...')" style="padding:15px; background:var(--gold);">SYNC ACCOUNT</button>
        </div>
    </main>

    <script>
        // MASTER JS
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'live') initChart();
        }

        function initChart() {
            if(!window.tv) {
                new TradingView.widget({"container_id": "tv-container", "symbol": "OANDA:XAUUSD", "theme": "dark", "autosize": true});
                window.tv = true;
            }
        }

        function runReplay() {
            const date = document.getElementById('r-date').value;
            document.getElementById('logs').innerHTML += `<div>[REPLAY] Loading data for ${date}...</div>`;
        }

        function calc() {
            const b = document.getElementById('bal').value;
            const s = document.getElementById('sl').value;
            document.getElementById('res').innerText = "LOTS: " + (b * 0.01 / (s * 10)).toFixed(2);
        }
    </script>
</body>
</html>
