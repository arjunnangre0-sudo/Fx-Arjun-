<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fx_arjun | Terminal</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 220px; height: 100vh; border-right: 1px solid #333; padding: 20px; }
        .logo { font-weight: bold; font-size: 20px; color: #fff; margin-bottom: 40px; display: block; }
        .menu-item { color: #888; padding: 10px 0; cursor: pointer; font-size: 14px; }
        .menu-item:hover { color: #fff; }

        /* Main Area */
        .content { flex-grow: 1; padding: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .box { border: 1px solid #333; padding: 20px; background: #0a0a0a; }
        .label { color: #666; font-size: 12px; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Fx_arjun</div>
        <div class="menu-item">DASHBOARD</div>
        <div class="menu-item">MARKETS</div>
        <div class="menu-item">TRADES</div>
        <div class="menu-item">ANALYSIS</div>
    </div>

    <div class="content">
        <div class="top-bar">
            <h1>Overview</h1>
        </div>
        
        <div class="dashboard-grid">
            <div class="box">
                <div class="label">BALANCE</div>
                <div class="value">$12,450.00</div>
            </div>
            <div class="box">
                <div class="label">EQUITY</div>
                <div class="value">$11,890.00</div>
            </div>
            <div class="box">
                <div class="label">MARGIN LEVEL</div>
                <div class="value">2450%</div>
            </div>
        </div>
    </div>

</body>
</html>
