<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Hub - Original Base</title>
    <style>
        /* ========================================= */
        /* TERA ORIGINAL 10/7 CSS BINA KISI CHANGE KE */
        /* ========================================= */
        :root {
            --bg-dark: #0a0e17;
            --panel-bg: #111827;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
        }

        .nav-item.active {
            background: var(--accent-blue);
            color: white;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background-color: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* ========================================= */
        /* SIRF NAYE BUTTONS KE SIMPLE STYLES        */
        /* ========================================= */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            color: white;
            width: 100%;
        }
        .btn-blue { background: var(--accent-blue); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); }
        
        .replay-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .replay-bar select, .replay-bar input { padding: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 5px; }
        
        .ai-log {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            height: 400px; /* Force section to stay open */
            overflow-y: auto;
            border: 1px solid #111;
        }
        
        .chart-box {
            background: #000;
            height: 400px; /* Force section to stay open */
            border-radius: 8px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">APEX HUD</div>
        <div class="nav-item active">🚀 Live Execution</div>
        <div class="nav-item">⏪ Market Replay</div>
        <div class="nav-item">📊 Trade Journal</div>
        <div class="nav-item">🤖 Jarvis Settings</div>
    </div>

    <div class="workspace">
        <div class="top-bar">
            <div><strong>Status:</strong> <span style="color: var(--accent-green);">Phase 3 Live</span></div>
            <div style="color: var(--accent-green); font-family: monospace;">00:00:00 IST</div>
        </div>

        <div class="grid-container">
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                
                <div class="panel">
                    <h2 class="panel-title">Execution Gateway</h2>
                    <button class="btn btn-blue" onclick="window.open('https://web.metatrader.app/terminal?lang=en', '_blank', 'width=1200,height=800')">
                        LAUNCH TERMINAL (NEW TAB)
                    </button>
                    <button class="btn btn-outline" onclick="alert('System Synced')">
                        🔄 SYNC INTERFACE
                    </button>
                </div>

                <div class="panel">
                    <h2 class="panel-title">Market Replay (XAUUSD)</h2>
                    <div class="replay-bar">
                        <select><option>XAUUSD</option></select>
                        <input type="date" value="2026-06-01">
                        <button class="btn btn-blue" style="width: auto; margin: 0;">Play Chart</button>
                    </div>
                    
                    <div class="chart-box" id="tv_chart"></div>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">Jarvis Event Log</h2>
                <div class="ai-log">
                    <span style="color: #9ca3af;">[System] Apex Core Initialized.</span><br>
                    <span style="color: var(--accent-green);">[Success] MetaQuotes Bypass Ready.</span><br>
                    <span style="color: var(--accent-blue);">[Jarvis] Awaiting Market Data...</span><br>
                </div>
            </div>

        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "15",
            "timezone": "Asia/Kolkata",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "backgroundColor": "#000000",
            "hide_top_toolbar": true,
            "container_id": "tv_chart"
        });
    </script>
</body>
</html>
