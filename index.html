<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.22 PRO TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
            --tv-bg: #020202;
        }

        /* Light Mode Variables */
        body.light-theme {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --tv-bg: #ffffff;
        }

        /* Core Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: var(--font-family); 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: 280px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10; 
        }

        .brand-section h1 { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            text-align: center; 
            letter-spacing: 2px; 
            margin-bottom: 50px; 
        }

        .nav-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1; 
        }

        .nav-btn { 
            padding: 16px 20px; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            background: transparent; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            outline: none; 
        }

        .nav-btn:hover { 
            border-color: var(--gold-accent); 
            color: var(--gold-accent); 
            background: rgba(212, 175, 55, 0.02); 
        }

        .nav-btn.active { 
            border-color: var(--gold-accent); 
            color: var(--text-main); 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); 
            border-left: 4px solid var(--gold-accent); 
        }

        .sidebar-footer { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-align: center; 
            border-top: 1px solid var(--border-color); 
            padding-top: 20px; 
        }

        /* Workspace Core Container */
        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            padding: 15px 40px; 
            border-bottom: 1px solid var(--border-color); 
            background-color: var(--bg-primary); 
            gap: 20px; 
        }

        .action-btn-jarvis {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--profit-green);
            color: var(--profit-green);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn-jarvis:hover {
            background: var(--profit-green);
            color: #000;
        }

        .theme-toggle-btn { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            transition: 0.3s; 
        }

        .theme-toggle-btn:hover { 
            color: var(--gold-accent); 
            border-color: var(--gold-accent); 
        }

        .profile-widget { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid transparent; 
        }

        .profile-info { 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .profile-status { 
            font-size: 11px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            margin-top: 3px; 
        }

        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--profit-green); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--profit-green); 
        }

        .profile-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #111; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 12px; 
            overflow: hidden; 
        }

        /* Page Content Logic */
        .page { 
            display: none; 
            flex: 1; 
            padding: 20px 40px 40px 40px; 
            overflow-y: hidden; 
        }

        .page.active { 
            display: flex; 
            flex-direction: column; 
        }
        
        .tv-layout-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            overflow: hidden; 
            background-color: var(--tv-bg); 
            box-shadow: var(--card-shadow); 
            position: relative; 
        }

        /* TradingView Wrapper */
        .tv-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* Bottom Editor Panel (Jarvis Editor remains custom) */
        .tv-bottom-editor { 
            height: 250px; 
            background-color: #0a0a0a; 
            border-top: 1px solid var(--border-color); 
            display: none; 
            flex-direction: column; 
            z-index: 5; 
        }

        .editor-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px; 
            background-color: #050505; 
            border-bottom: 1px solid var(--border-color); 
        }

        .editor-title { 
            font-size: 12px; 
            color: var(--gold-accent); 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .editor-textarea { 
            flex: 1; 
            background-color: #0a0a0a; 
            color: #a3be8c; 
            font-family: monospace; 
            border: none; 
            padding: 15px; 
            resize: none; 
            outline: none; 
            font-size: 14px; 
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section">
            <h1>FX_ARJUN</h1>
        </div>
        <div class="nav-group">
            <button class="nav-btn active" onclick="switchTab(this, 'chart-page')">Live Engine</button>
        </div>
        <div class="sidebar-footer">ALGO ENGINE V4.0.22</div>
    </div>

    <div class="workspace" id="main-workspace">
        
        <div class="top-bar">
            <button class="action-btn-jarvis" onclick="toggleEditor()">
                <i class="fa-solid fa-code"></i> Jarvis Editor
            </button>

            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>

            <div class="profile-widget">
                <div class="profile-info">
                    <span class="profile-name">ARJUN NANGRE</span>
                    <span class="profile-status"><span class="status-dot"></span><span>LIVE SECURED</span></span>
                </div>
                <div class="profile-avatar">A</div>
            </div>
        </div>
        
        <div id="chart-page" class="page active">
            <div class="tv-layout-container" id="tv-layout-container">
                
                <div class="tv-wrapper" id="tradingview_container"></div>

                <div class="tv-bottom-editor" id="jarvis-editor-panel">
                    <div class="editor-header">
                        <span class="editor-title">Jarvis Algo Editor</span>
                        <div>
                            <button onclick="toggleEditor()" style="background: transparent; border: none; cursor: pointer; color: var(--text-dim); font-size: 16px;">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                    <textarea class="editor-textarea" spellcheck="false">// Welcome to Jarvis Algo Editor
// Native Bridge to FX_ARJUN Backend
// Author: Fx_arjun

study("SMC Liquidity Sweep Algorithm", overlay=true)

// Define parameters
length = input(14, title="Lookback Period")
inducementLevel = ta.highest(high, length)

// Execution Logic
if (close > inducementLevel)
    strategy.entry("Long", strategy.long)
    alert("Sweep Confirmed - Executing Trade")
                    </textarea>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- TRADINGVIEW WIDGET INITIALIZATION ---
        let tvWidget;

        function initTradingView(theme) {
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": "OANDA:XAUUSD",
                "interval": "15",
                "timezone": "Asia/Kolkata",
                "theme": theme,
                "style": "1", // 1 = Candles
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": theme === "dark" ? "#020202" : "#ffffff", // Matches our custom wrapper
                "gridColor": theme === "dark" ? "#111111" : "#f1f5f9",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_container",
                "toolbar_bg": theme === "dark" ? "#0a0a0a" : "#f1f5f9",
                "withdateranges": true,
                "studies": [
                    "Volume@tv-basicstudies"
                ]
            });
        }

        // Initialize with default dark theme
        initTradingView("dark");

        // --- UI LOGIC ---
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            let newTheme = "dark";

            if (document.body.classList.contains('light-theme')) {
                icon.classList.remove('fa-moon'); 
                icon.classList.add('fa-sun');
                newTheme = "light";
            } else {
                icon.classList.remove('fa-sun'); 
                icon.classList.add('fa-moon');
            }
            
            // Re-initialize the widget with the new theme
            initTradingView(newTheme);
        }

        function toggleEditor() {
            const panel = document.getElementById('jarvis-editor-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
