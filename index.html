<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.11 NATIVE ENGINE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
            
            /* TV-Specific Colors */
            --tv-bg: #000000;
            --tv-toolbar-bg: #0a0a0a;
            --tv-border: #131313;
            --tv-icon-color: #777777;
            --tv-icon-hover: #ffffff;
            --tv-icon-active: #d4af37;
        }

        /* Core Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: var(--font-family); 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: 280px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10;
        }

        .brand-section h1 { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            text-align: center; 
            letter-spacing: 2px; 
            margin-bottom: 50px; 
        }

        .nav-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1; 
        }

        .nav-btn { 
            padding: 16px 20px; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            background: transparent; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            outline: none; 
        }

        .nav-btn:hover { 
            border-color: var(--gold-accent); 
            color: var(--gold-accent); 
            background: rgba(212, 175, 55, 0.02); 
        }

        .nav-btn.active { 
            border-color: var(--gold-accent); 
            color: var(--text-main); 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); 
            border-left: 4px solid var(--gold-accent); 
        }

        .sidebar-footer { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-align: center; 
            letter-spacing: 1px; 
            border-top: 1px solid var(--border-color); 
            padding-top: 20px; 
        }

        /* Workspace Core Container */
        .workspace { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #0f1218 0%, var(--bg-primary) 60%); 
        }

        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            padding: 20px 40px; 
            border-bottom: 1px solid var(--border-color); 
            background-color: var(--bg-primary);
        }

        .profile-widget { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid transparent; 
        }

        .profile-info { 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .profile-status { 
            font-size: 11px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            margin-top: 3px; 
        }

        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--profit-green); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--profit-green); 
        }

        .profile-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #111; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 12px; 
            overflow: hidden; 
        }

        /* Page Content Logic */
        .page { 
            display: none; 
            flex: 1;
            padding: 20px 40px 40px 40px;
            overflow-y: auto;
        }

        .page.active { 
            display: flex; 
            flex-direction: column;
        }

        /* =====================================================================
           TRADINGVIEW STYLE CUSTOM UI LAYOUT
           ===================================================================== */
        
        .tv-layout-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--tv-bg);
            box-shadow: var(--card-shadow);
        }

        /* Top Toolbar (Timeframes & Indicators) */
        .tv-top-toolbar {
            height: 50px;
            background-color: var(--tv-toolbar-bg);
            border-bottom: 1px solid var(--tv-border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }

        .tv-timeframes {
            display: flex;
            gap: 5px;
        }

        .tv-tf-btn {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .tv-tf-btn:hover {
            color: var(--tv-icon-hover);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tv-tf-btn.active {
            color: var(--gold-accent);
        }

        .tv-top-tools {
            display: flex;
            gap: 15px;
        }

        .tv-top-action {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .tv-top-action:hover {
            color: var(--tv-icon-hover);
        }

        /* Main Workspace Row */
        .tv-main-row {
            display: flex;
            flex: 1;
            height: calc(100% - 50px);
        }

        /* Left Vertical Toolbar (Drawing Tools) */
        .tv-left-toolbar {
            width: 50px;
            background-color: var(--tv-toolbar-bg);
            border-right: 1px solid var(--tv-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 15px;
        }

        .tv-left-tool-btn {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            font-size: 16px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .tv-left-tool-btn:hover {
            color: var(--tv-icon-hover);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tv-left-tool-btn.active {
            color: var(--tv-icon-active);
            background-color: rgba(212, 175, 55, 0.1);
        }

        /* Canvas Wrapper Area */
        .tv-canvas-wrapper {
            flex: 1;
            position: relative;
            background-color: #000; /* Deep black for chart */
            cursor: crosshair;
            overflow: hidden;
        }

        #customChartCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Right Price Scale */
        .tv-price-scale {
            width: 70px;
            background-color: var(--tv-toolbar-bg);
            border-left: 1px solid var(--tv-border);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: flex-end;
            padding: 20px 10px;
            font-size: 11px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .current-price-badge {
            background-color: var(--profit-green);
            color: #000;
            padding: 4px 6px;
            border-radius: 2px;
            font-weight: 800;
            width: 100%;
            text-align: right;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section">
            <h1>FX_ARJUN</h1>
        </div>
        
        <div class="nav-group">
            <button class="nav-btn active" onclick="switchTab(this, 'chart-page')">Pro Terminal</button>
        </div>
        
        <div class="sidebar-footer">
            ALGO ENGINE V4.0.11
        </div>
    </div>

    <div class="workspace">
        
        <div class="top-bar">
            <div class="profile-widget">
                <div class="profile-info">
                    <span class="profile-name">ARJUN NANGRE</span>
                    <span class="profile-status">
                        <span class="status-dot"></span> 
                        <span>LIVE SECURED</span>
                    </span>
                </div>
                <div class="profile-avatar">A</div>
            </div>
        </div>
        
        <div id="chart-page" class="page active">
            
            <div class="tv-layout-container">
                
                <div class="tv-top-toolbar">
                    <div class="tv-timeframes">
                        <button class="tv-tf-btn">1m</button>
                        <button class="tv-tf-btn">5m</button>
                        <button class="tv-tf-btn active">15m</button>
                        <button class="tv-tf-btn">1H</button>
                        <button class="tv-tf-btn">4H</button>
                        <button class="tv-tf-btn">D</button>
                    </div>
                    
                    <div class="tv-top-tools">
                        <button class="tv-top-action"><i class="fa-solid fa-chart-line"></i> Jarvis Indicators</button>
                        <button class="tv-top-action"><i class="fa-solid fa-play"></i> Replay Engine</button>
                        <button class="tv-top-action"><i class="fa-solid fa-gear"></i> Settings</button>
                    </div>
                </div>

                <div class="tv-main-row">
                    
                    <div class="tv-left-toolbar">
                        <button class="tv-left-tool-btn active" id="tool-cursor" onclick="selectTool('cursor')" title="Cursor">
                            <i class="fa-solid fa-arrow-pointer"></i>
                        </button>
                        <button class="tv-left-tool-btn" id="tool-trendline" onclick="selectTool('trendline')" title="Trend Line">
                            <i class="fa-solid fa-minus" style="transform: rotate(-45deg);"></i>
                        </button>
                        <button class="tv-left-tool-btn" id="tool-rectangle" onclick="selectTool('rectangle')" title="Rectangle">
                            <i class="fa-regular fa-square"></i>
                        </button>
                        <button class="tv-left-tool-btn" id="tool-path" onclick="selectTool('path')" title="Path">
                            <i class="fa-solid fa-pen-nib"></i>
                        </button>
                        
                        <div style="flex-grow: 1;"></div> <button class="tv-left-tool-btn" onclick="clearCanvasDrawings()" title="Remove All Drawings">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>

                    <div class="tv-canvas-wrapper" id="canvas-wrapper">
                        <canvas id="customChartCanvas"></canvas>
                    </div>

                    <div class="tv-price-scale">
                        <div>2400.00</div>
                        <div>2380.00</div>
                        <div>2360.00</div>
                        <div>2340.00</div>
                        <div class="current-price-badge">2326.83</div>
                        <div>2300.00</div>
                        <div>2280.00</div>
                    </div>

                </div>

            </div>
            
        </div>

    </div>

    <script>
        const canvas = document.getElementById('customChartCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        let currentTool = 'cursor';
        let isDrawing = false;
        let shapes = [];
        let currentShape = null;

        // Resize Canvas to fit wrapper precisely
        function resizeCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            renderEngine();
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Simulated Market Data (Price coordinates)
        const dummyCandles = [
            { x: 150, open: 250, high: 180, low: 320, close: 290, color: '#ff4444' }, // Red
            { x: 200, open: 290, high: 220, low: 350, close: 260, color: '#00ff88' }, // Green
            { x: 250, open: 260, high: 150, low: 280, close: 180, color: '#00ff88' }, // Green
            { x: 300, open: 180, high: 100, low: 220, close: 120, color: '#00ff88' }  // Green (Current)
        ];

        // --- TOOL SELECTION LOGIC ---
        function selectTool(toolName) {
            currentTool = toolName;
            
            // UI Button Update
            document.querySelectorAll('.tv-left-tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool-' + toolName).classList.add('active');
            
            // Change Cursor based on tool
            wrapper.style.cursor = toolName === 'cursor' ? 'default' : 'crosshair';
        }

        function clearCanvasDrawings() {
            shapes = [];
            renderEngine();
        }

        // --- MOUSE EVENTS FOR DRAWING ---
        canvas.addEventListener('mousedown', (e) => {
            if (currentTool === 'cursor') return;
            
            const rect = canvas.getBoundingClientRect();
            const startX = e.clientX - rect.left;
            const startY = e.clientY - rect.top;
            
            isDrawing = true;
            
            if (currentTool === 'trendline') {
                currentShape = { type: 'line', startX, startY, endX: startX, endY: startY };
            } else if (currentTool === 'rectangle') {
                currentShape = { type: 'rect', startX, startY, width: 0, height: 0 };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || currentTool === 'cursor') return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            if (currentTool === 'trendline') {
                currentShape.endX = mouseX;
                currentShape.endY = mouseY;
            } else if (currentTool === 'rectangle') {
                currentShape.width = mouseX - currentShape.startX;
                currentShape.height = mouseY - currentShape.startY;
            }
            
            renderEngine(); // Re-render to show live drawing
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentShape) {
                shapes.push(currentShape); // Save to memory
            }
            currentShape = null;
        });

        // --- MASTER RENDER LOOP ---
        function renderEngine() {
            // 1. Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Background Grid
            ctx.strokeStyle = '#131313';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i = 0; i < canvas.width; i += 60) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
            for(let i = 0; i < canvas.height; i += 60) { ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); }
            ctx.stroke();

            // 3. Draw Candles
            dummyCandles.forEach(c => {
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 2;
                
                // Wick
                ctx.beginPath();
                ctx.moveTo(c.x, c.high);
                ctx.lineTo(c.x, c.low);
                ctx.stroke();
                
                // Body
                ctx.fillStyle = c.color;
                const bodyY = Math.min(c.open, c.close);
                const bodyHeight = Math.max(c.open, c.close) - bodyY;
                ctx.fillRect(c.x - 6, bodyY, 12, Math.max(bodyHeight, 2));
            });

            // 4. Draw Saved User Shapes
            shapes.forEach(shape => drawShape(shape));

            // 5. Draw Active Shape (while dragging mouse)
            if (currentShape) {
                drawShape(currentShape);
            }
        }

        // Helper function to draw specific shape types
        function drawShape(shape) {
            ctx.strokeStyle = '#d4af37'; // FX_ARJUN Gold
            ctx.lineWidth = 2;
            
            if (shape.type === 'line') {
                ctx.beginPath();
                ctx.moveTo(shape.startX, shape.startY);
                ctx.lineTo(shape.endX, shape.endY);
                ctx.stroke();
            } else if (shape.type === 'rect') {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.1)'; // Transparent Gold Fill
                ctx.fillRect(shape.startX, shape.startY, shape.width, shape.height);
                ctx.strokeRect(shape.startX, shape.startY, shape.width, shape.height);
            }
        }

        function switchTab(btn, tabId) {
            // Simple tab switcher logic
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            resizeCanvas(); // Ensure canvas matches new layout display
        }

        // Boot up the engine
        setTimeout(resizeCanvas, 100);

    </script>
</body>
</html>
