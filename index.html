<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Arjun Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: #151a22;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #262f3c;
        }
        h1 {
            color: #00ff88;
            margin-bottom: 1rem;
        }
        p {
            color: #8492a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fx Arjun Trading Dashboard</h1>
        <p>Welcome to your live trading platform. Systems are fully operational.</p>
    </div>
</body>
</html>
