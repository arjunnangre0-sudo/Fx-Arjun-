<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V7.0 INSTITUTIONAL TERMINAL</title>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #030303; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .terminal { display: flex; flex-direction: column; height: 100vh; }
        #chart-container { flex: 1; position: relative; }
        
        /* Execution Panel Overlay (Left Side) */
        .exec-panel {
            position: absolute; top: 100px; left: 60px; width: 220px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #333;
            padding: 15px; border-radius: 8px; z-index: 10;
        }
        .btn { width: 100%; padding: 10px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="chart-container"></div>
    
    <div class="exec-panel">
        <h4 style="color:#d4af37; margin-bottom:10px;">ONE-CLICK EXECUTION</h4>
        <input type="number" id="lot" value="1.00" style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:8px;">
        <button class="btn" style="background:#089981; color:#fff;" onclick="alert('Long Executed')">BUY MARKET</button>
        <button class="btn" style="background:#f23645; color:#fff;" onclick="alert('Short Executed')">SELL MARKET</button>
    </div>
</div>

<script type="text/javascript">
    new TradingView.widget({
        "container_id": "chart-container",
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#030303",
        "enable_publishing": false,
        "allow_symbol_change": true,
        "hide_side_toolbar": false, // This gives you the tools
        "show_popup_button": true,
        "popup_width": "1000",
        "popup_height": "650",
        "studies": ["MACD@tv-basicstudies"]
    });
</script>
</body>
</html>
