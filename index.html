<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.8 PRODUCTION MASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* [KEEPING ALL YOUR ORIGINAL V4.0.8 CSS VARIABLES AND LAYOUT HERE] */
        :root { --bg-primary: #050505; --bg-card: #0a0a0a; --gold-accent: #d4af37; --border-color: #1a1a1a; --text-main: #ffffff; --profit-green: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar, Profile, Page CSS remain exactly as you defined */
        .sidebar { width: 280px; background: #050505; border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; }
        .workspace { flex: 1; padding: 20px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f1218 0%, var(--bg-primary) 60%); }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Integration Styles */
        #tv-chart-box { width: 100%; height: 650px; background: #000; border: 1px solid var(--border-color); border-radius: 8px; }
        .mtj-box { background: var(--bg-card); padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section"><h1>FX_ARJUN</h1></div>
        <div class="nav-group">
            <button class="nav-btn active" onclick="switchTab(this, 'dash')">Dashboard</button>
            <button class="nav-btn" onclick="switchTab(this, 'chart-page')">Live Chart Engine</button>
            <button class="nav-btn" onclick="switchTab(this, 'mtj-page')">MTJ Journey</button>
        </div>
    </div>

    <div class="workspace">
        
        <div id="dash" class="page active">
            <h1>Welcome, Arjun</h1>
            <div class="stats-grid">
                <div class="stat-card"><div class="label">Balance</div><div class="stat-value">$24,500.00</div></div>
            </div>
        </div>

        <div id="chart-page" class="page">
            <div class="header-label">LIVE MARKET TERMINAL</div>
            <div id="tv-chart-box"></div>
        </div>

        <div id="mtj-page" class="page">
            <div class="mtj-box">
                <h2>My Trading Journey Stats</h2>
                <canvas id="mtjRadar"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching Logic
        function switchTab(btn, pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            
            // Re-init chart if Live Page is opened
            if(pageId === 'chart-page') initChart();
        }

        // TradingView Pro Engine
        function initChart() {
            if(!document.getElementById('tradingview-widget-container')) {
                document.getElementById('tv-chart-box').innerHTML = '<div id="tradingview-widget-container" style="width:100%; height:100%;"></div>';
                new TradingView.widget({
                    "container_id": "tradingview-widget-container",
                    "symbol": "OANDA:XAUUSD",
                    "interval": "15",
                    "theme": "dark",
                    "autosize": true,
                    "hide_side_toolbar": false
                });
            }
        }

        // MTJ Dashboard Engine
        new Chart(document.getElementById('mtjRadar'), {
            type: 'radar',
            data: {
                labels: ['WinRate', 'RR', 'Consistency', 'Psychology'],
                datasets: [{ data: [80, 75, 90, 85], backgroundColor: 'rgba(212, 175, 55, 0.2)', borderColor: '#d4af37' }]
            }
        });
    </script>
</body>
</html>
