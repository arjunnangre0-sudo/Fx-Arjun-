<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Arjun Professional Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #05070a; 
            color: #e0e0e0; 
            overflow: hidden; 
        }

        /* Sidebar - Fixed to the left */
        .sidebar { 
            width: 260px; 
            background: #0d1117; 
            border-right: 1px solid #21262d; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar h2 { color: #00ff88; margin-bottom: 40px; font-size: 1.5rem; text-align: center; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 15px 20px; margin-bottom: 10px; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .sidebar ul li:hover { background: #1f242d; color: #fff; }

        /* Main Content - Takes remaining space */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            background: #05070a; 
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: #0d1117; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #21262d; 
        }
        .card h3 { color: #8b949e; font-size: 0.9rem; margin-bottom: 10px; }
        .card p { font-size: 1.8rem; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Fx Arjun</h2>
        <ul>
            <li>Dashboard</li>
            <li>Live Charts</li>
            <li>Trade History</li>
            <li>Analytics</li>
            <li>Settings</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Trading Overview</h1>
        </div>
        <div class="stats-grid">
            <div class="card"><h3>Total Balance</h3><p>$12,450.00</p></div>
            <div class="card"><h3>Today's Profit</h3><p>+$890.50</p></div>
            <div class="card"><h3>Win Rate</h3><p>78%</p></div>
            <div class="card"><h3>Active Orders</h3><p>4</p></div>
        </div>
    </div>
</body>
</html>
