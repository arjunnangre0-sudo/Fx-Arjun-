<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FX_ARJUN | TERMINAL</title>
    <style>
        :root { 
            --bg: #030303; 
            --card-bg: #0a0a0a; 
            --gold: #d4af37; 
            --border: #1a1a1a; 
            --text: #ffffff; 
            --dim: #666666; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 240px; background: #050505; border-right: 1px solid var(--border); padding: 30px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--gold); margin-bottom: 50px; }
        .nav-item { padding: 15px 0; color: var(--dim); border-bottom: 1px solid var(--border); cursor: pointer; }

        /* Main Dashboard */
        .main { flex: 1; padding: 30px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        .section { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 4px; /* Crisp edges */
        }
        .section-title { color: var(--gold); font-size: 11px; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }

        /* Trade History Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { color: var(--dim); text-align: left; padding: 10px; font-size: 11px; }
        .data-table td { padding: 15px 10px; border-top: 1px solid var(--border); font-size: 13px; }

        /* AI Section (Sidebar fixed) */
        .ai-box { height: 100%; display: flex; flex-direction: column; }
        .ai-response { flex: 1; color: var(--dim); font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">FX_ARJUN</div>
        <div class="nav-item">DASHBOARD</div>
        <div class="nav-item">TRADE HISTORY</div>
        <div class="nav-item" style="color:var(--gold)">CONNECT ACCOUNT</div>
    </div>

    <div class="main">
        <div class="section">
            <div class="section-title">LIVE TRADE HISTORY</div>
            <table class="data-table">
                <tr><th>PAIR</th><th>TYPE</th><th>LOTS</th><th>RESULT</th></tr>
                <tr><td>XAUUSD</td><td>BUY</td><td>0.50</td><td style="color:#00ff88">+$420.00</td></tr>
                <tr><td>XAUUSD</td><td>SELL</td><td>1.20</td><td style="color:#ff4444">-$150.00</td></tr>
            </table>
        </div>

        <div class="section ai-box">
            <div class="section-title">JARVIS AI ANALYSIS</div>
            <div class="ai-response">
                <p>Waiting for account sync...</p>
                <br>
                <p style="color:var(--text)">Status: Connected</p>
                <p>Analyzing liquidity zones...</p>
            </div>
        </div>
    </div>

</body>
</html>
