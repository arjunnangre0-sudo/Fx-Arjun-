<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | ULTRA TRADING TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
        }

        /* Core Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* ... [KEEPING YOUR ORIGINAL CSS HERE] ... */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .brand-section h1 { font-size: 26px; font-weight: 900; color: var(--gold-accent); text-align: center; letter-spacing: 2px; margin-bottom: 50px; }
        .nav-group { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .nav-btn { padding: 16px 20px; color: var(--text-dim); border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; text-align: left; text-transform: uppercase; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; outline: none; }
        .nav-btn:hover { border-color: var(--gold-accent); color: var(--gold-accent); background: rgba(212, 175, 55, 0.02); }
        .nav-btn.active { border-color: var(--gold-accent); color: var(--text-main); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); border-left: 4px solid var(--gold-accent); }
        .workspace { flex: 1; padding: 20px 40px 40px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f1218 0%, var(--bg-primary) 60%); }
        .boundary-box { border: 1px solid var(--border-color); background-color: var(--bg-card); padding: 30px; border-radius: 8px; margin-bottom: 24px; box-shadow: var(--card-shadow); }
        .header-label { color: var(--gold-accent); font-size: 11px; text-transform: uppercase; margin-bottom: 22px; letter-spacing: 2px; font-weight: 700; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--text-dim); text-align: left; padding: 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border-color); }
        td { padding: 16px 14px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: #e0e0e0; }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section"><h1>FX_ARJUN</h1></div>
        <div class="nav-group">
            <button class="nav-btn active" onclick="window.switchTab(this, 'dash')">Dashboard</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'hist')">Trade History</button>
            </div>
        <div class="sidebar-footer">ALGO ENGINE V4.0.4</div>
    </div>

    <div class="workspace">
        <div id="dash" class="page active">...</div>
        
        <div id="hist" class="page">
            <div class="boundary-box">
                <div class="header-label">Algorithmic Trade Synchronization Log</div>
                <table>
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Asset Pair</th>
                            <th>Order Type</th>
                            <th>Volume</th>
                            <th>Net Profit / Loss</th>
                        </tr>
                    </thead>
                    <tbody id="trade-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Tab Switcher Logic
        window.switchTab = function(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        };

        // Supabase Logic
        const supabase = supabase.createClient(
            'https://ufpulcszcgbuzpoauhlm.supabase.co', 
            'sb_publishable_DYKjIa7NM-QkAVlBQ1vk-g_FUH701cl'
        );

        async function fetchTrades() {
            const tbody = document.getElementById('trade-body');
            const { data, error } = await supabase.from('trades').select('*').order('ticket', { ascending: false });
            
            if (error) { console.error(error); return; }
            
            tbody.innerHTML = '';
            data.forEach(t => {
                tbody.innerHTML += `
                    <tr>
                        <td>${t.ticket}</td>
                        <td>${t.symbol}</td>
                        <td style="color:${t.type === 0 ? '#00ff88' : '#ff4444'}">${t.type === 0 ? 'BUY' : 'SELL'}</td>
                        <td>${t.volume}</td>
                        <td style="color:${t.profit >= 0 ? '#00ff88' : '#ff4444'}">$${t.profit.toFixed(2)}</td>
                    </tr>
                `;
            });
        }
        
        fetchTrades();
    </script>
</body>
</html>
