<div id="dashboard">
    <h2>Live Trading Journal</h2>
    <div style="overflow-x: auto;">
        <table id="hist" style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background-color: #2c3e50; color: white;">
                    <th style="padding: 12px;">Ticket</th>
                    <th>Symbol</th>
                    <th>Type</th>
                    <th>Volume</th>
                    <th>Profit/Loss ($)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient(
        'https://ufpulcszcgbuzpoauhlm.supabase.co', 
        'sb_publishable_DYKjIa7NM-QkAVlBQ1vk-g_FUH701cl'
    );

    async function updateDashboard() {
        const tbody = document.querySelector('#hist tbody');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading data...</td></tr>';

        const { data, error } = await supabase
            .from('trades')
            .select('*')
            .order('ticket', { ascending: false });

        if (error) {
            tbody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Error loading data.</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        data.forEach(trade => {
            const row = document.createElement('tr');
            row.style.borderBottom = "1px solid #ddd";
            row.innerHTML = `
                <td style="padding: 10px;">${trade.ticket}</td>
                <td>${trade.symbol}</td>
                <td style="color: ${trade.type === 0 ? 'green' : 'red'}; font-weight:bold;">${trade.type === 0 ? 'BUY' : 'SELL'}</td>
                <td>${trade.volume}</td>
                <td style="font-weight:bold; color: ${trade.profit >= 0 ? '#27ae60' : '#e74c3c'}">$${trade.profit.toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        });
    }

    updateDashboard();
</script>
