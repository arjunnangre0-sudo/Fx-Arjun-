<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | INSTITUTIONAL MASTER TERMINAL V9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-primary: #050505; --bg-card: #0a0a0a; --bg-sidebar: #050505;
            --border-color: #1a1a1a; --gold-accent: #d4af37; --text-main: #ffffff;
            --text-dim: #777777; --profit-green: #00ff88; --loss-red: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; }
        .brand-section h1 { font-size: 26px; font-weight: 900; color: var(--gold-accent); text-align: center; margin-bottom: 50px; }
        .nav-group { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .nav-btn { padding: 16px 20px; color: var(--text-dim); border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; text-align: left; text-transform: uppercase; font-size: 12px; font-weight: 600; }
        .nav-btn.active { border-left: 4px solid var(--gold-accent); color: var(--text-main); background: rgba(212, 175, 55, 0.1); }
        
        /* Workspace */
        .workspace { flex: 1; padding: 20px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f1218 0%, #050505 60%); }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        .profile-widget { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
        .status-dot { width: 8px; height: 8px; background: var(--loss-red); border-radius: 50%; }
        .status-dot.online { background: var(--profit-green); box-shadow: 0 0 8px var(--profit-green); }

        /* Replay Panel */
        .replay-panel { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        
        /* Utility */
        .page { display: none; } .page.active { display: block; }
        .boundary-box { border: 1px solid var(--border-color); background: var(--bg-card); padding: 30px; border-radius: 8px; margin-bottom: 24px; }
        .calculator-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .input-field { background: #000; border: 1px solid var(--border-color); color: #fff; padding: 14px; border-radius: 6px; }
        .action-btn { grid-column: span 2; background: var(--gold-accent); color: #000; padding: 16px; border: none; cursor: pointer; font-weight: 700; border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--text-dim); text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section"><h1>FX_ARJUN</h1></div>
        <div class="nav-group">
            <button class="nav-btn active" onclick="switchTab(this, 'dash')">Dashboard</button>
            <button class="nav-btn" onclick="switchTab(this, 'engine')">Live Trading Engine</button>
            <button class="nav-btn" onclick="switchTab(this, 'risk')">Risk Manager</button>
            <button class="nav-btn" onclick="switchTab(this, 'hist')">Trade History</button>
            <button class="nav-btn" onclick="switchTab(this, 'ai')">Jarvis AI</button>
            <button class="nav-btn" id="mgmt-nav-btn" style="display:none;" onclick="switchTab(this, 'peoples')">Traders (Mgmt)</button>
        </div>
        <div class="sidebar-footer" style="text-align:center; color:#555; padding-top:20px;">V9.0 ENGINE</div>
    </div>

    <div class="workspace">
        <div class="top-bar">
            <div class="profile-widget" onclick="triggerGoogleLogin()">
                <div class="profile-info" style="text-align:right;">
                    <span id="user-name-display" style="display:block;">GUEST_USER</span>
                    <span id="user-status-text" style="font-size:10px;">OFFLINE</span>
                </div>
                <div id="user-avatar-display" style="width:40px;height:40px; background:#111; border-radius:50%; display:flex; align-items:center; justify-content:center;">LOGIN</div>
            </div>
        </div>

        <div id="dash" class="page active">
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px;">
                <div class="boundary-box"><div class="label">EQUITY</div><div class="stat-value">$24,500.00</div></div>
                <div class="boundary-box"><div class="label">P&L</div><div class="stat-value" style="color:var(--profit-green)">+$1,240</div></div>
            </div>
        </div>

        <div id="engine" class="page">
            <div class="replay-panel">
                <input type="date" id="replay-date" class="input-field">
                <select class="input-field"><option>1x Speed</option><option>5x Speed</option></select>
                <button onclick="alert('Replay Initialized for selected Date')" style="padding:10px 20px; background:var(--gold-accent);">PLAY REPLAY</button>
            </div>
            <div id="tv-container" style="height:500px; border:1px solid var(--border-color);"></div>
        </div>

        <div id="risk" class="page">
            <div class="boundary-box">
                <div class="calculator-grid">
                    <input type="number" id="bal" class="input-field" placeholder="Balance">
                    <input type="number" id="risk" class="input-field" placeholder="Risk %">
                    <button class="action-btn" onclick="calc()">CALCULATE ALLOCATION</button>
                </div>
                <div id="res" style="margin-top:20px; font-size:24px; color:var(--profit-green);"></div>
            </div>
        </div>

        <div id="hist" class="page">
            <div class="boundary-box">
                <table>
                    <thead><tr><th>DATE</th><th>ASSET</th><th>RESULT</th></tr></thead>
                    <tbody><tr><td>2026-06-08</td><td>XAUUSD</td><td style="color:var(--profit-green);">+$420.00</td></tr></tbody>
                </table>
            </div>
        </div>
        
        <div id="ai" class="page"><div class="boundary-box"><h2>JARVIS AI MATRIX: BULLISH CHoCH CONFIRMED</h2></div></div>
    </div>

    <script>
        function switchTab(btn, id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'engine') initChart();
        }

        function initChart() {
            if(!window.tv) { new TradingView.widget({"container_id": "tv-container", "symbol": "OANDA:XAUUSD", "theme": "dark", "autosize": true}); window.tv = true; }
        }

        function calc() {
            const b = document.getElementById('bal').value;
            const r = document.getElementById('risk').value;
            document.getElementById('res').innerText = "LOTS: " + (b * (r/100) / 250).toFixed(2);
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyBTwak_MdTo_Op0NCcCBCMB8hOxLf0f1RE", authDomain: "fxarjun-terminal-c5ba8.firebaseapp.com", projectId: "fxarjun-terminal-c5ba8", storageBucket: "fxarjun-terminal-c5ba8.firebasestorage.app", messagingSenderId: "876627003815", appId: "1:876627003815:web:3f5f4578d861c9318fce82" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        window.triggerGoogleLogin = () => {
            signInWithPopup(auth, provider).then((res) => {
                document.getElementById('user-name-display').innerText = res.user.displayName.toUpperCase();
                document.getElementById('user-status-text').innerText = "LIVE SECURED";
                document.getElementById('mgmt-nav-btn').style.display = "block";
            });
        };
    </script>
</body>
</html>
