<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | ELITE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --panel: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --green: #00ff88;
            --red: #ff4444;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 80px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 30px;
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--gold); transform: rotate(-90deg); }

        .nav-item {
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: var(--gold-glow); border: 1px solid var(--gold); color: var(--gold); }

        /* Main Workspace */
        .workspace { flex: 1; padding: 30px; overflow-y: auto; }

        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }

        /* Trading Card (Glassmorphism) */
        .card {
            background: var(--panel);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
        }

        .price-display {
            font-family: 'JetBrains Mono';
            font-size: 4rem;
            letter-spacing: -2px;
            margin: 10px 0;
        }

        /* Buttons with Gold Glow */
        .btn-trade {
            padding: 15px 40px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn-buy { background: var(--green); color: black; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .btn-sell { background: var(--red); color: white; box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        .btn-trade:hover { transform: translateY(-5px); opacity: 0.9; }

        /* Smooth Transition for UI */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">ARJUN</div>
        <div class="nav-item" onclick="showPage('dash')">📊</div>
        <div class="nav-item" onclick="showPage('trade')">⚡</div>
    </nav>

    <main class="workspace">
        <div id="dash" class="page active">
            <div class="dashboard-header">
                <h1>ELITE DASHBOARD</h1>
                <div style="background: #111; padding: 10px 20px; border-radius: 50px;">STATUS: <span style="color:var(--green)">SYNCED</span></div>
            </div>
            <div class="card" style="width: 300px;">
                <h3>BALANCE</h3>
                <div class="price-display">$24,500</div>
                <p style="color:var(--text-dim)">Live Equity</p>
            </div>
        </div>

        <div id="trade" class="page">
            <h1>EXECUTION TERMINAL</h1>
            <div class="card" style="max-width: 500px; margin-top: 20px;">
                <div class="price-display" id="live-price" style="font-size: 2.5rem; color: var(--gold);">2324.45</div>
                <div style="display: flex; gap: 15px;">
                    <button class="btn-trade btn-buy" onclick="alert('BUY ORDER FIRED')">BUY XAUUSD</button>
                    <button class="btn-trade btn-sell" onclick="alert('SELL ORDER FIRED')">SELL XAUUSD</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Live price effect
        setInterval(() => {
            const el = document.getElementById('live-price');
            const newPrice = (2320 + Math.random() * 10).toFixed(2);
            el.innerText = newPrice;
        }, 1000);
    </script>
</body>
</html>
