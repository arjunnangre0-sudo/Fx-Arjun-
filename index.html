<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | Professional Terminal</title>
    <style>
        :root {
            --bg-color: #030303;
            --sidebar-color: #050505;
            --card-bg: #0a0a0a;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Structure */
        .sidebar { 
            width: 280px; 
            background-color: var(--sidebar-color); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
        }
        .brand-logo { font-size: 24px; font-weight: 900; color: var(--gold-accent); margin-bottom: 60px; letter-spacing: 1px; text-align: center; }
        .nav-button { 
            padding: 20px; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            margin-bottom: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: center;
        }
        .nav-button:hover { border-color: var(--gold-accent); color: var(--gold-accent); }

        /* Main Content Area */
        .main-workspace { flex: 1; padding: 40px; overflow-y: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        /* Component Boxes with Boundaries */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box-boundary { 
            border: 1px solid var(--border-color); 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 8px; 
        }
        .section-header { color: var(--gold-accent); font-size: 12px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--text-dim); text-align: left; padding: 10px; font-size: 11px; }
        td { padding: 15px 10px; border-top: 1px solid var(--border-color); font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo">FX_ARJUN</div>
        <div class="nav-button" onclick="openPage('dash')">DASHBOARD</div>
        <div class="nav-button" onclick="openPage('hist')">TRADE HISTORY</div>
        <div class="nav-button" onclick="openPage('ai')">JARVIS AI ANALYSIS</div>
        <div class="nav-button" onclick="openPage('acc')">ACCOUNT CONNECT</div>
    </div>

    <div class="main-workspace">
        <div id="dash" class="page-content active">
            <div class="dashboard-container">
                <div class="box-boundary">
                    <div class="section-header">ACCOUNT SUMMARY</div>
                    <p style="font-size: 24px;">Balance: $24,500.00</p>
                </div>
                <div class="box-boundary">
                    <div class="section-header">LIVE STATUS</div>
                    <p>Jarvis AI: <span style="color:#00ff88">Active & Monitoring</span></p>
                </div>
            </div>
        </div>

        <div id="hist" class="page-content">
            <div class="box-boundary">
                <div class="section-header">FULL TRADE HISTORY</div>
                <table>
                    <tr><th>PAIR</th><th>TYPE</th><th>RESULT</th></tr>
                    <tr><td>XAUUSD</td><td>BUY</td><td>+$420.00</td></tr>
                </table>
            </div>
        </div>

        <div id="ai" class="page-content">
            <div class="box-boundary">
                <div class="section-header">JARVIS DEEP ANALYSIS</div>
                <p>Analyzing liquidity sweeps and order blocks...</p>
            </div>
        </div>

        <div id="acc" class="page-content">
            <div class="box-boundary">
                <div class="section-header">GOOGLE AUTHENTICATION</div>
                <button style="padding: 10px 20px; background:var(--gold-accent); border:none; cursor:pointer;">Login with Google</button>
            </div>
        </div>
    </div>

    <script>
        function openPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
