<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | ULTRA TRADING TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ADDED: Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
        }

        /* Core Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); }
        
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Premium Sidebar Navigation */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .brand-section h1 { font-size: 26px; font-weight: 900; color: var(--gold-accent); text-align: center; letter-spacing: 2px; margin-bottom: 50px; }
        .nav-group { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .nav-btn { padding: 16px 20px; color: var(--text-dim); border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; text-align: left; text-transform: uppercase; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; outline: none; }
        .nav-btn:hover { border-color: var(--gold-accent); color: var(--gold-accent); background: rgba(212, 175, 55, 0.02); }
        .nav-btn.active { border-color: var(--gold-accent); color: var(--text-main); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); border-left: 4px solid var(--gold-accent); }
        #mgmt-nav-btn { border: 1px dashed var(--gold-accent); display: none; color: var(--gold-accent); }
        .sidebar-footer { color: var(--text-dim); font-size: 11px; text-align: center; letter-spacing: 1px; border-top: 1px solid var(--border-color); padding-top: 20px; }

        /* Workspace Core Container */
        .workspace { flex: 1; padding: 20px 40px 40px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f1218 0%, var(--bg-primary) 60%); }

        /* Top Bar & Profile Widget */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; padding-bottom: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); }
        .profile-widget { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: background 0.3s; border: 1px solid transparent; }
        .profile-widget:hover { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); }
        .profile-info { display: flex; flex-direction: column; text-align: right; }
        .profile-name { font-size: 14px; font-weight: 700; color: var(--text-main); letter-spacing: 0.5px; }
        .profile-status { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 3px; }
        .status-dot { width: 8px; height: 8px; background: var(--loss-red); border-radius: 50%; box-shadow: 0 0 8px var(--loss-red); transition: all 0.3s ease; }
        .status-dot.online { background: var(--profit-green); box-shadow: 0 0 8px var(--profit-green); }
        .profile-avatar { width: 42px; height: 42px; border-radius: 50%; background: #111; border: 1px solid var(--border-color); color: var(--text-dim); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; letter-spacing: 1px; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Page Content Logic */
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Technical Components */
        .boundary-box { border: 1px solid var(--border-color); background-color: var(--bg-card); padding: 30px; border-radius: 8px; margin-bottom: 24px; box-shadow: var(--card-shadow); }
        .header-label { color: var(--gold-accent); font-size: 11px; text-transform: uppercase; margin-bottom: 22px; letter-spacing: 2px; font-weight: 700; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { border: 1px solid var(--border-color); background-color: var(--bg-card); padding: 24px; border-radius: 8px; box-shadow: var(--card-shadow); }
        .stat-card .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
        .stat-value { font-size: 28px; font-weight: 700; margin-top: 12px; letter-spacing: -0.5px; }
        .stat-sub { font-size: 12px; color: var(--gold-accent); margin-top: 6px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--text-dim); text-align: left; padding: 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border-color); }
        td { padding: 16px 14px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: #e0e0e0; }
        tr:hover td { background-color: rgba(255, 255, 255, 0.01); }

        /* Form & Calculator */
        .calculator-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .input-field { background-color: #000; border: 1px solid var(--border-color); color: var(--text-main); padding: 14px; font-size: 14px; border-radius: 6px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--gold-accent); }
        .action-btn { grid-column: span 2; background-color: var(--gold-accent); color: #000; font-weight: 700; border: none; padding: 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .calc-result-box { grid-column: span 2; background: rgba(212, 175, 55, 0.02); border: 1px dashed var(--gold-accent); padding: 20px; border-radius: 6px; margin-top: 15px; display: none; }
        .badge-high { color: var(--loss-red); font-weight: bold; background: rgba(255, 68, 68, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .badge-med { color: var(--gold-accent); font-weight: bold; background: rgba(212, 175, 55, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .badge-active { color: var(--profit-green); font-weight: bold; background: rgba(0, 255, 136, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .dashboard-split { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .flex-col { display: flex; flex-direction: column; gap: 24px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-section"><h1>FX_ARJUN</h1></div>
        <div class="nav-group">
            <button class="nav-btn active" onclick="window.switchTab(this, 'dash')">Dashboard</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'live-market')" style="color: var(--profit-green); border-color: rgba(0,255,136,0.2);">Live Market</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'risk')">Risk Manager</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'hist')">Trade History</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'ai')">Jarvis AI Analysis</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'calendar')">Macro Calendar</button>
            <button class="nav-btn" onclick="window.switchTab(this, 'acc')">Account Connect</button>
            <button class="nav-btn" id="mgmt-nav-btn" onclick="window.switchTab(this, 'peoples')">Traders (Mgmt)</button>
        </div>
        <div class="sidebar-footer">ALGO ENGINE V4.0.4</div>
    </div>

    <div class="workspace">
        <div class="top-bar">
            <div class="profile-widget" onclick="window.triggerGoogleLogin()">
                <div class="profile-info">
                    <span class="profile-name" id="user-name-display">GUEST_USER</span>
                    <span class="profile-status"><span class="status-dot" id="user-status-dot"></span> <span id="user-status-text">OFFLINE</span></span>
                </div>
                <div class="profile-avatar" id="user-avatar-display">LOGIN</div>
            </div>
        </div>

        <div id="dash" class="page active">
            <!-- Stats Grid... -->
        </div>

        <!-- TRADE HISTORY SECTION -->
        <div id="hist" class="page">
            <div class="boundary-box">
                <div class="header-label">Algorithmic Trade Synchronization Log</div>
                <table>
                    <thead>
                        <tr>
                            <th>Ticket</th><th>Asset Pair</th><th>Order Type</th><th>Volume</th><th>Net Profit / Loss</th>
                        </tr>
                    </thead>
                    <tbody id="trade-body">
                        <!-- Data loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
        <!-- ... OTHER PAGES ... -->
    </div>

    <script>
        window.switchTab = function(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        };

        // SUPABASE LOGIC
        const supabase = supabase.createClient(
            'https://ufpulcszcgbuzpoauhlm.supabase.co', 
            'sb_publishable_DYKjIa7NM-QkAVlBQ1vk-g_FUH701cl'
        );

        async function fetchTrades() {
            const tbody = document.getElementById('trade-body');
            const { data, error } = await supabase.from('trades').select('*').order('ticket', { ascending: false });
            if (error) { console.error(error); return; }
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.ticket}</td>
                    <td>${t.symbol}</td>
                    <td style="color:${t.type === 0 ? '#00ff88' : '#ff4444'}">${t.type === 0 ? 'BUY' : 'SELL'}</td>
                    <td>${t.volume}</td>
                    <td style="color:${t.profit >= 0 ? '#00ff88' : '#ff4444'}">$${t.profit.toFixed(2)}</td>
                </tr>
            `).join('');
        }
        window.addEventListener('load', fetchTrades);
    </script>
</body>
</html>
