<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.15 NATIVE ENGINE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
            
            /* Custom Canvas UI Colors */
            --tv-bg: #020202;
            --tv-toolbar-bg: #0a0a0a;
            --tv-border: #131313;
            --tv-icon-color: #777777;
            --tv-icon-hover: #ffffff;
            --tv-icon-active: #d4af37;
        }

        /* Light Mode Variables */
        body.light-theme {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --tv-bg: #ffffff;
            --tv-toolbar-bg: #f1f5f9;
            --tv-border: #cbd5e1;
            --tv-icon-color: #475569;
            --tv-icon-hover: #0f172a;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        /* Core Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: var(--font-family); 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: 280px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10;
        }

        .brand-section h1 { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            text-align: center; 
            letter-spacing: 2px; 
            margin-bottom: 50px; 
        }

        .nav-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1; 
        }

        .nav-btn { 
            padding: 16px 20px; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            background: transparent; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            outline: none; 
        }

        .nav-btn:hover { 
            border-color: var(--gold-accent); 
            color: var(--gold-accent); 
            background: rgba(212, 175, 55, 0.02); 
        }

        .nav-btn.active { 
            border-color: var(--gold-accent); 
            color: var(--text-main); 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); 
            border-left: 4px solid var(--gold-accent); 
        }

        .sidebar-footer { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-align: center; 
            letter-spacing: 1px; 
            border-top: 1px solid var(--border-color); 
            padding-top: 20px; 
        }

        /* Workspace Core Container */
        .workspace { 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            padding: 20px 40px; 
            border-bottom: 1px solid var(--border-color); 
            background-color: var(--bg-primary);
            gap: 20px;
        }

        .theme-toggle-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: 0.3s;
        }

        .theme-toggle-btn:hover {
            color: var(--gold-accent);
            border-color: var(--gold-accent);
        }

        .profile-widget { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid transparent; 
        }

        .profile-info { 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .profile-status { 
            font-size: 11px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            margin-top: 3px; 
        }

        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--profit-green); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--profit-green); 
        }

        .profile-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #111; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 12px; 
            overflow: hidden; 
        }

        /* Page Content Logic */
        .page { 
            display: none; 
            flex: 1;
            padding: 20px 40px 40px 40px;
            overflow-y: hidden;
        }

        .page.active { 
            display: flex; 
            flex-direction: column;
        }
        
        .tv-layout-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--tv-bg);
            box-shadow: var(--card-shadow);
            position: relative;
        }

        /* Top Toolbar */
        .tv-top-toolbar {
            height: 50px;
            background-color: var(--tv-toolbar-bg);
            border-bottom: 1px solid var(--tv-border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }

        .tv-timeframes {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .tv-tf-btn {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            padding: 5px 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .tv-tf-btn:hover {
            color: var(--tv-icon-hover);
            background-color: rgba(120, 120, 120, 0.1);
        }

        .tv-tf-btn.active {
            color: var(--gold-accent);
        }
        
        .tv-tf-divider {
            width: 1px;
            height: 20px;
            background-color: var(--tv-border);
            margin: 0 5px;
        }

        /* Main Row */
        .tv-main-row {
            display: flex;
            flex: 1;
            height: calc(100% - 50px);
            position: relative;
        }

        /* Left Vertical Toolbar */
        .tv-left-toolbar {
            width: 50px;
            background-color: var(--tv-toolbar-bg);
            border-right: 1px solid var(--tv-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            overflow-y: auto;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        .tv-left-toolbar::-webkit-scrollbar {
            display: none;
        }

        .tv-left-tool-btn {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            font-size: 16px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .tv-left-tool-btn:hover {
            color: var(--tv-icon-hover);
            background-color: rgba(120, 120, 120, 0.1);
        }

        .tv-left-tool-btn.active {
            color: var(--tv-icon-active);
            background-color: rgba(212, 175, 55, 0.1);
        }

        .tv-tool-divider {
            width: 30px;
            height: 1px;
            background-color: var(--tv-border);
            margin: 5px 0;
            flex-shrink: 0;
        }

        /* Canvas Wrapper Area */
        .tv-canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .tv-canvas-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--tv-bg); 
            cursor: crosshair;
            overflow: hidden;
        }

        #customChartCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* =====================================================================
           NEW: FLOATING DYNAMIC SETTINGS PANEL
           ===================================================================== */
        .floating-settings-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: var(--tv-toolbar-bg);
            border: 1px solid var(--tv-border);
            border-radius: 8px;
            padding: 15px;
            width: 220px;
            box-shadow: var(--card-shadow);
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .settings-header {
            font-size: 11px;
            color: var(--gold-accent);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--tv-border);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-label {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .settings-input-color {
            background: transparent;
            border: 1px solid var(--tv-border);
            border-radius: 4px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            padding: 2px;
        }

        .settings-input-range {
            width: 80px;
            accent-color: var(--gold-accent);
        }

        /* Bottom Editor Panel */
        .tv-bottom-editor {
            height: 200px;
            background-color: var(--tv-toolbar-bg);
            border-top: 1px solid var(--tv-border);
            display: flex;
            flex-direction: column;
            display: none; 
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background-color: #050505;
            border-bottom: 1px solid var(--tv-border);
        }

        .editor-title {
            font-size: 12px;
            color: var(--gold-accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .editor-actions button {
            background: transparent;
            border: none;
            color: var(--tv-icon-color);
            cursor: pointer;
            margin-left: 10px;
        }
        
        .editor-actions button:hover { color: var(--gold-accent); }

        .editor-textarea {
            flex: 1;
            background-color: var(--bg-card);
            color: #a3be8c; 
            font-family: monospace;
            border: none;
            padding: 15px;
            resize: none;
            outline: none;
            font-size: 14px;
        }

        /* Right Price Scale */
        .tv-price-scale {
            width: 70px;
            background-color: var(--tv-toolbar-bg);
            border-left: 1px solid var(--tv-border);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: flex-end;
            padding: 20px 10px;
            font-size: 11px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .current-price-badge {
            background-color: var(--profit-green);
            color: #000;
            padding: 4px 6px;
            border-radius: 2px;
            font-weight: 800;
            width: 100%;
            text-align: right;
        }

    </style>
</head>

    <script>
        // --- TIMEFRAME SWITCHING LOGIC ---
        function switchTimeframe(btn) {
            document.querySelectorAll('.tv-tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            console.log("Switched Timeframe to:", btn.innerText);
        }

        // --- THEME TOGGLE LOGIC ---
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-theme')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            renderEngine(); 
        }

        // --- EDITOR TOGGLE LOGIC ---
        function toggleEditor() {
            const panel = document.getElementById('jarvis-editor-panel');
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'flex';
            }
            setTimeout(resizeCanvas, 50); 
        }

        // --- FLOATING SETTINGS LOGIC ---
        function openSettingsPanel(toolName) {
            const panel = document.getElementById('floating-settings');
            const title = document.getElementById('active-tool-name');
            panel.style.display = 'flex';
            title.innerText = toolName.toUpperCase() + " SETTINGS";
        }

        function closeSettingsPanel() {
            document.getElementById('floating-settings').style.display = 'none';
        }

        // --- CANVAS ENGINE ---
        const canvas = document.getElementById('customChartCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        let currentTool = 'cursor';
        let isDrawing = false;
        let shapes = [];
        let currentShape = null;

        function resizeCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            renderEngine();
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Simulated Market Data
        const dummyCandles = [
            { x: 150, open: 250, high: 180, low: 320, close: 290, color: '#ff4444' }, 
            { x: 200, open: 290, high: 220, low: 350, close: 260, color: '#00ff88' }, 
            { x: 250, open: 260, high: 150, low: 280, close: 180, color: '#00ff88' }, 
            { x: 300, open: 180, high: 100, low: 220, close: 120, color: '#00ff88' }  
        ];

        // --- TOOL SELECTION LOGIC ---
        function selectTool(toolName) {
            currentTool = toolName;
            
            // UI Button Update
            document.querySelectorAll('.tv-left-tool-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('tool-' + toolName);
            if(activeBtn) activeBtn.classList.add('active');
            
            // Manage Settings Panel & Cursor
            if (toolName === 'cursor') {
                wrapper.style.cursor = 'default';
                closeSettingsPanel();
            } else {
                wrapper.style.cursor = 'crosshair';
                openSettingsPanel(toolName);
            }
        }

        function clearCanvasDrawings() {
            shapes = [];
            renderEngine();
        }

        // Helper to grab current settings from UI
        function getCurrentToolSettings() {
            return {
                color: document.getElementById('setting-color').value,
                thickness: document.getElementById('setting-thickness').value
            };
        }

        // --- MOUSE EVENTS FOR DRAWING ---
        canvas.addEventListener('mousedown', (e) => {
            if (currentTool === 'cursor') return;
            
            const rect = canvas.getBoundingClientRect();
            const startX = e.clientX - rect.left;
            const startY = e.clientY - rect.top;
            const settings = getCurrentToolSettings();
            
            // Single Click Tools
            if (currentTool === 'horzline') {
                shapes.push({ type: 'horzline', y: startY, ...settings });
                renderEngine();
                return;
            } else if (currentTool === 'vertline') {
                shapes.push({ type: 'vertline', x: startX, ...settings });
                renderEngine();
                return;
            }

            // Drag Tools
            isDrawing = true;
            
            if (currentTool === 'trendline') {
                currentShape = { type: 'line', startX, startY, endX: startX, endY: startY, ...settings };
            } else if (currentTool === 'rectangle') {
                currentShape = { type: 'rect', startX, startY, width: 0, height: 0, ...settings };
            } else if (currentTool === 'long') {
                currentShape = { type: 'long', startX, startY, endY: startY, ...settings };
            } else if (currentTool === 'short') {
                currentShape = { type: 'short', startX, startY, endY: startY, ...settings };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || currentTool === 'cursor') return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            if (currentTool === 'trendline') {
                currentShape.endX = mouseX;
                currentShape.endY = mouseY;
            } else if (currentTool === 'rectangle') {
                currentShape.width = mouseX - currentShape.startX;
                currentShape.height = mouseY - currentShape.startY;
            } else if (currentTool === 'long' || currentTool === 'short') {
                currentShape.endY = mouseY; 
            }
            
            renderEngine();
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentShape) shapes.push(currentShape);
            currentShape = null;
        });

        // --- MASTER RENDER LOOP ---
        function renderEngine() {
            const isLightMode = document.body.classList.contains('light-theme');
            
            ctx.fillStyle = isLightMode ? '#ffffff' : '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = isLightMode ? '#e2e8f0' : '#131313';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i = 0; i < canvas.width; i += 60) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
            for(let i = 0; i < canvas.height; i += 60) { ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); }
            ctx.stroke();

            dummyCandles.forEach(c => {
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(c.x, c.high);
                ctx.lineTo(c.x, c.low);
                ctx.stroke();
                
                ctx.fillStyle = c.color;
                const bodyY = Math.min(c.open, c.close);
                const bodyHeight = Math.max(c.open, c.close) - bodyY;
                ctx.fillRect(c.x - 6, bodyY, 12, Math.max(bodyHeight, 2));
            });

            shapes.forEach(shape => drawShape(shape));

            if (currentShape) drawShape(currentShape);
        }

        function drawShape(shape) {
            ctx.lineWidth = shape.thickness || 2;
            ctx.strokeStyle = shape.color || '#d4af37'; 
            
            if (shape.type === 'line') {
                ctx.beginPath();
                ctx.moveTo(shape.startX, shape.startY);
                ctx.lineTo(shape.endX, shape.endY);
                ctx.stroke();
            } else if (shape.type === 'horzline') {
                ctx.beginPath();
                ctx.moveTo(0, shape.y);
                ctx.lineTo(canvas.width, shape.y);
                ctx.stroke();
            } else if (shape.type === 'vertline') {
                ctx.beginPath();
                ctx.moveTo(shape.x, 0);
                ctx.lineTo(shape.x, canvas.height);
                ctx.stroke();
            } else if (shape.type === 'rect') {
                // Generate a transparent fill based on the selected hex color
                let r = parseInt(shape.color.slice(1, 3), 16),
                    g = parseInt(shape.color.slice(3, 5), 16),
                    b = parseInt(shape.color.slice(5, 7), 16);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.1)`; 
                
                ctx.fillRect(shape.startX, shape.startY, shape.width, shape.height);
                ctx.strokeRect(shape.startX, shape.startY, shape.width, shape.height);
            } else if (shape.type === 'long') {
                const width = 120;
                const entryY = shape.startY;
                const currentY = shape.endY;
                const diff = entryY - currentY; 
                
                ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
                ctx.fillRect(shape.startX, entryY - diff, width, diff);
                ctx.strokeStyle = '#00ff88';
                ctx.strokeRect(shape.startX, entryY - diff, width, diff);

                ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
                ctx.fillRect(shape.startX, entryY, width, diff / 2);
                ctx.strokeStyle = '#ff4444';
                ctx.strokeRect(shape.startX, entryY, width, diff / 2);
                
                ctx.beginPath(); ctx.moveTo(shape.startX, entryY); ctx.lineTo(shape.startX + width, entryY); ctx.stroke();
                
            } else if (shape.type === 'short') {
                const width = 120;
                const entryY = shape.startY;
                const currentY = shape.endY;
                const diff = currentY - entryY; 
                
                ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
                ctx.fillRect(shape.startX, entryY, width, diff);
                ctx.strokeStyle = '#00ff88';
                ctx.strokeRect(shape.startX, entryY, width, diff);

                ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
                ctx.fillRect(shape.startX, entryY - (diff / 2), width, diff / 2);
                ctx.strokeStyle = '#ff4444';
                ctx.strokeRect(shape.startX, entryY - (diff / 2), width, diff / 2);
                
                ctx.beginPath(); ctx.moveTo(shape.startX, entryY); ctx.lineTo(shape.startX + width, entryY); ctx.stroke();
            }
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            resizeCanvas(); 
        }

        setTimeout(resizeCanvas, 100);
    </script>
</body>
</html>
