<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.10 NATIVE ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #050505; --bg-card: #0a0a0a; --bg-sidebar: #050505; --border-color: #1a1a1a; --gold-accent: #d4af37; --text-main: #ffffff; --text-dim: #777777; --profit-green: #00ff88; --loss-red: #ff4444; --font-family: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); }
        body { background-color: var(--bg-primary); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 40px 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .brand-section h1 { font-size: 26px; font-weight: 900; color: var(--gold-accent); text-align: center; letter-spacing: 2px; margin-bottom: 50px; }
        .nav-group { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .nav-btn { padding: 16px 20px; color: var(--text-dim); border: 1px solid var(--border-color); background: transparent; border-radius: 6px; cursor: pointer; text-align: left; text-transform: uppercase; font-size: 12px; font-weight: 600; }
        .nav-btn.active { border-color: var(--gold-accent); color: var(--text-main); background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); border-left: 4px solid var(--gold-accent); }

        .workspace { flex: 1; padding: 20px 40px 40px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f1218 0%, var(--bg-primary) 60%); }
        .page { display: none; } .page.active { display: block; }
        .boundary-box { border: 1px solid var(--border-color); background-color: var(--bg-card); padding: 30px; border-radius: 8px; margin-bottom: 24px; }
        .header-label { color: var(--gold-accent); font-size: 11px; text-transform: uppercase; margin-bottom: 22px; font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }

        /* NATIVE CANVAS WRAPPER */
        #canvas-wrapper { width: 100%; height: 500px; position: relative; background-color: #000; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; cursor: crosshair; }
        #chartCanvas { display: block; width: 100%; height: 100%; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tool-btn { background: #111; border: 1px solid var(--border-color); color: #fff; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .tool-btn.active { background: rgba(212, 175, 55, 0.2); border-color: var(--gold-accent); color: var(--gold-accent); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand-section"><h1>FX_ARJUN</h1></div>
        <div class="nav-group"><button class="nav-btn active" onclick="switchTab(this, 'chart-page')">Native Charting</button></div>
        <div class="sidebar-footer">ALGO ENGINE V4.0.10</div>
    </div>

    <div class="workspace">
        <div id="chart-page" class="page active">
            <div class="boundary-box" style="padding: 20px;">
                <div class="header-label">XAUUSD - Custom Canvas Engine</div>
                <div class="toolbar">
                    <button class="tool-btn" id="drawModeBtn" onclick="toggleDrawMode()">Draw Trendline: OFF</button>
                    <button class="tool-btn" onclick="clearShapes()">Clear Drawings</button>
                </div>
                <div id="canvas-wrapper">
                    <canvas id="chartCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- NATIVE CANVAS ENGINE ---
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        // Resize Canvas to fit wrapper
        function resize() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            drawEverything();
        }
        window.addEventListener('resize', resize);

        // Dummy Data (In future, this will be x, y coordinates based on price)
        const dummyCandles = [
            { x: 100, open: 200, high: 150, low: 300, close: 250, color: '#ff4444' }, // Red
            { x: 150, open: 250, high: 180, low: 280, close: 200, color: '#00ff88' }, // Green
            { x: 200, open: 200, high: 100, low: 220, close: 150, color: '#00ff88' }  // Green
        ];

        let shapes = []; // Store custom drawings

        // --- DRAWING LOGIC ---
        let isDrawMode = false;
        let isDrawing = false;
        let currentLine = null;

        function toggleDrawMode() {
            isDrawMode = !isDrawMode;
            const btn = document.getElementById('drawModeBtn');
            btn.innerText = `Draw Trendline: ${isDrawMode ? 'ON' : 'OFF'}`;
            btn.classList.toggle('active', isDrawMode);
        }

        function clearShapes() {
            shapes = [];
            drawEverything();
        }

        // Mouse Events
        canvas.addEventListener('mousedown', (e) => {
            if (!isDrawMode) return;
            const rect = canvas.getBoundingClientRect();
            const startX = e.clientX - rect.left;
            const startY = e.clientY - rect.top;
            
            isDrawing = true;
            currentLine = { startX, startY, endX: startX, endY: startY };
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            currentLine.endX = e.clientX - rect.left;
            currentLine.endY = e.clientY - rect.top;
            drawEverything();
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            shapes.push(currentLine); // Save the line permanently
            currentLine = null;
        });

        // Main Render Loop
        function drawEverything() {
            // 1. Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Basic Grid (Optional)
            ctx.strokeStyle = '#111';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=50) { ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); }
            for(let i=0; i<canvas.height; i+=50) { ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); }
            ctx.stroke();

            // 3. Draw Dummy Candles
            dummyCandles.forEach(c => {
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 2;
                // Draw Wick
                ctx.beginPath();
                ctx.moveTo(c.x, c.high);
                ctx.lineTo(c.x, c.low);
                ctx.stroke();
                // Draw Body
                ctx.fillStyle = c.color;
                const bodyY = Math.min(c.open, c.close);
                const bodyHeight = Math.max(c.open, c.close) - bodyY;
                ctx.fillRect(c.x - 8, bodyY, 16, bodyHeight);
            });

            // 4. Draw Saved Shapes (Trendlines)
            ctx.strokeStyle = '#d4af37'; // Gold Trendlines
            ctx.lineWidth = 2;
            shapes.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.startX, line.startY);
                ctx.lineTo(line.endX, line.endY);
                ctx.stroke();
            });

            // 5. Draw Currently Drawing Line
            if (currentLine) {
                ctx.beginPath();
                ctx.moveTo(currentLine.startX, currentLine.startY);
                ctx.lineTo(currentLine.endX, currentLine.endY);
                ctx.stroke();
            }
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // Initialize
        setTimeout(resize, 100);
    </script>
</body>
</html>
