<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V4.0.20 NATIVE LIVE ENGINE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Pro-Trader Color Palette & CSS Variables */
        :root {
            --bg-primary: #050505;
            --bg-card: #0a0a0a;
            --bg-sidebar: #050505;
            --border-color: #1a1a1a;
            --gold-accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #777777;
            --profit-green: #00ff88;
            --loss-red: #ff4444;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --font-family: 'Inter', sans-serif;
            
            /* Custom Canvas UI Colors */
            --tv-bg: #020202;
            --tv-toolbar-bg: #0a0a0a;
            --tv-border: #131313;
            --tv-icon-color: #777777;
            --tv-icon-hover: #ffffff;
            --tv-icon-active: #d4af37;
            --grid-color: #111111;
        }

        /* Light Mode Variables */
        body.light-theme {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --tv-bg: #ffffff;
            --tv-toolbar-bg: #f1f5f9;
            --tv-border: #cbd5e1;
            --tv-icon-color: #475569;
            --tv-icon-hover: #0f172a;
            --grid-color: #f1f5f9;
        }

        /* Core Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: var(--font-family); 
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* Sidebar Navigation */
        .sidebar { 
            width: 280px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color); 
            padding: 40px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 10; 
        }

        .brand-section h1 { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold-accent); 
            text-align: center; 
            letter-spacing: 2px; 
            margin-bottom: 50px; 
        }

        .nav-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1; 
        }

        .nav-btn { 
            padding: 16px 20px; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            background: transparent; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            outline: none; 
        }

        .nav-btn:hover { 
            border-color: var(--gold-accent); 
            color: var(--gold-accent); 
            background: rgba(212, 175, 55, 0.02); 
        }

        .nav-btn.active { 
            border-color: var(--gold-accent); 
            color: var(--text-main); 
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%); 
            border-left: 4px solid var(--gold-accent); 
        }

        .sidebar-footer { 
            color: var(--text-dim); 
            font-size: 11px; 
            text-align: center; 
            border-top: 1px solid var(--border-color); 
            padding-top: 20px; 
        }

        /* Workspace Core Container */
        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            padding: 20px 40px; 
            border-bottom: 1px solid var(--border-color); 
            background-color: var(--bg-primary); 
            gap: 20px; 
        }

        .theme-toggle-btn { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            transition: 0.3s; 
        }

        .theme-toggle-btn:hover { 
            color: var(--gold-accent); 
            border-color: var(--gold-accent); 
        }

        .profile-widget { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid transparent; 
        }

        .profile-info { 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .profile-status { 
            font-size: 11px; 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            margin-top: 3px; 
        }

        .status-dot { 
            width: 8px; 
            height: 8px; 
            background: var(--profit-green); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--profit-green); 
        }

        .profile-avatar { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #111; 
            border: 1px solid var(--border-color); 
            color: var(--text-dim); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 12px; 
            overflow: hidden; 
        }

        /* Page Content Logic */
        .page { 
            display: none; 
            flex: 1; 
            padding: 20px 40px 40px 40px; 
            overflow-y: hidden; 
        }

        .page.active { 
            display: flex; 
            flex-direction: column; 
        }
        
        .tv-layout-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            overflow: hidden; 
            background-color: var(--tv-bg); 
            box-shadow: var(--card-shadow); 
            position: relative; 
        }

        /* Top Toolbar */
        .tv-top-toolbar { 
            height: 50px; 
            background-color: var(--tv-toolbar-bg); 
            border-bottom: 1px solid var(--tv-border); 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            justify-content: space-between; 
        }
        
        .tv-top-group { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }

        .tv-tf-btn { 
            background: transparent; 
            border: none; 
            color: var(--tv-icon-color); 
            padding: 6px 10px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 4px; 
            transition: 0.2s; 
        }

        .tv-tf-btn:hover { 
            color: var(--tv-icon-hover); 
            background-color: rgba(120, 120, 120, 0.1); 
        }

        .tv-tf-btn.active { 
            color: var(--gold-accent); 
        }

        .tv-tf-divider { 
            width: 1px; 
            height: 20px; 
            background-color: var(--tv-border); 
            margin: 0 8px; 
        }

        /* Settings Inputs */
        .settings-input-color { 
            background: transparent; 
            border: 1px solid var(--tv-border); 
            border-radius: 4px; 
            width: 26px; 
            height: 26px; 
            cursor: pointer; 
            padding: 1px; 
            margin-left: 5px;
        }

        .settings-input-range { 
            width: 70px; 
            accent-color: var(--gold-accent); 
            margin-left: 5px;
            cursor: pointer;
        }

        /* Main Row */
        .tv-main-row { 
            display: flex; 
            flex: 1; 
            height: calc(100% - 50px); 
            position: relative; 
        }

        /* Left Vertical Toolbar */
        .tv-left-toolbar { 
            width: 55px; 
            background-color: var(--tv-toolbar-bg); 
            border-right: 1px solid var(--tv-border); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px 0; 
            gap: 6px; 
            overflow-y: auto; 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        .tv-left-toolbar::-webkit-scrollbar { 
            display: none; 
        }
        
        .tv-left-tool-btn { 
            background: transparent; 
            border: none; 
            color: var(--tv-icon-color); 
            font-size: 16px; 
            cursor: pointer; 
            width: 38px; 
            height: 38px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            flex-shrink: 0; 
        }

        .tv-left-tool-btn:hover { 
            color: var(--tv-icon-hover); 
            background-color: rgba(120, 120, 120, 0.1); 
        }

        .tv-left-tool-btn.active { 
            color: var(--tv-icon-active); 
            background-color: rgba(212, 175, 55, 0.1); 
        }

        .tv-tool-divider { 
            width: 30px; 
            height: 1px; 
            background-color: var(--tv-border); 
            margin: 4px 0; 
            flex-shrink: 0; 
        }

        /* Canvas Wrapper Area */
        .tv-canvas-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: var(--tv-bg);
            cursor: crosshair;
        }

        #mainCanvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }

        /* Custom Toast Notification */
        #custom-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #111;
            color: var(--gold-accent);
            text-align: center;
            border-radius: 8px;
            border: 1px solid var(--gold-accent);
            padding: 16px;
            position: absolute;
            z-index: 1000;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #custom-toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Bottom Editor Panel */
        .tv-bottom-editor { 
            height: 200px; 
            background-color: var(--tv-toolbar-bg); 
            border-top: 1px solid var(--tv-border); 
            display: none; 
            flex-direction: column; 
            z-index: 5;
        }

        .editor-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 5px 15px; 
            background-color: #050505; 
            border-bottom: 1px solid var(--tv-border); 
        }

        .editor-title { 
            font-size: 12px; 
            color: var(--gold-accent); 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .editor-textarea { 
            flex: 1; 
            background-color: var(--bg-card); 
            color: #a3be8c; 
            font-family: monospace; 
            border: none; 
            padding: 15px; 
            resize: none; 
            outline: none; 
            font-size: 14px; 
        }

    </style>
</head>
<body>

    <script>
        // --- UI UTILITIES ---
        function showCustomToast(message) {
            const toast = document.getElementById("custom-toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function toggleFullScreen() {
            const elem = document.getElementById("tv-layout-container");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => showCustomToast(`Error: ${err.message}`));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-theme')) {
                icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
            }
            renderChart(); 
        }

        function toggleEditor() {
            const panel = document.getElementById('jarvis-editor-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
            setTimeout(resizeCanvas, 50); 
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            resizeCanvas(); 
        }

        function switchTimeframe(btn, tf) {
            document.querySelectorAll('.tv-tf-btn').forEach(b => { if(b.innerText.length <= 3) b.classList.remove('active'); });
            btn.classList.add('active');
            showCustomToast(`Timeframe switched to ${btn.innerText}. Re-calculating tick matrix...`);
            // In a real scenario, this resets data. For simulation, we just notify.
        }

        // --- NATIVE MATH ENGINE & LIVE DATA SIMULATOR ---
        
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // State Variables
        let candles = [];
        let drawings = [];
        let currentTool = 'cursor';
        
        // Viewport Math Variables
        let panX = 0;            // How far we have dragged horizontally
        const candleWidth = 8;
        const candleSpacing = 16;
        let rightMargin = 100;  // Space for price scale
        let priceMin = 0;
        let priceMax = 0;
        let isDragging = false;
        let lastMouseX = 0;

        // Drawing State
        let activeDrawing = null;

        // 1. Generate Historical XAUUSD Data
        function generateHistoricalData() {
            let startPrice = 2330.50;
            let time = new Date('2026-06-03T00:00:00Z').getTime();
            
            for(let i=0; i<100; i++) {
                let open = startPrice;
                let close = open + (Math.random() * 4 - 2); // Random walk
                let high = Math.max(open, close) + (Math.random() * 2);
                let low = Math.min(open, close) - (Math.random() * 2);
                
                candles.push({ xIndex: i, open, high, low, close, time });
                startPrice = close;
                time += 15 * 60000; // +15 mins
            }
            
            // Set initial Pan to view the most recent candles
            panX = -((candles.length * candleSpacing) - (window.innerWidth - rightMargin - 300));
        }

        // 2. LIVE TICK SIMULATOR (Fires every 200ms)
        function startLiveSimulation() {
            setInterval(() => {
                let lastCandle = candles[candles.length - 1];
                let tick = (Math.random() * 0.6 - 0.3); // Micro movement
                
                lastCandle.close += tick;
                if(lastCandle.close > lastCandle.high) lastCandle.high = lastCandle.close;
                if(lastCandle.close < lastCandle.low) lastCandle.low = lastCandle.close;

                // Update UI Header Price
                const priceDisplay = document.getElementById('live-price-display');
                priceDisplay.innerText = `XAUUSD ${lastCandle.close.toFixed(2)}`;
                priceDisplay.style.color = lastCandle.close >= lastCandle.open ? 'var(--profit-green)' : 'var(--loss-red)';

                // Randomly start a new candle occasionally
                if (Math.random() > 0.95) {
                    let newTime = lastCandle.time + 15 * 60000;
                    candles.push({ xIndex: candles.length, open: lastCandle.close, high: lastCandle.close, low: lastCandle.close, close: lastCandle.close, time: newTime });
                    // Auto-pan slightly to keep chart moving forward
                    panX -= candleSpacing; 
                }

                renderChart();
            }, 200);
        }

        // 3. CORE MATH: Map Price to Canvas Y Coordinate
        function priceToY(price) {
            const range = priceMax - priceMin;
            if(range === 0) return canvas.height / 2;
            const drawableHeight = canvas.height - 40; // Add padding top/bottom
            // Calculate percentage from bottom, invert for canvas (0 is top)
            const percent = (price - priceMin) / range;
            return canvas.height - 20 - (percent * drawableHeight);
        }

        // Map Canvas Y Coordinate to Price
        function yToPrice(y) {
            const drawableHeight = canvas.height - 40;
            const percent = (canvas.height - 20 - y) / drawableHeight;
            return priceMin + (percent * (priceMax - priceMin));
        }

        // Map X Index to Canvas X Coordinate
        function indexToX(index) {
            return (index * candleSpacing) + panX;
        }

        // Map Canvas X Coordinate to nearest Index
        function xToIndex(x) {
            return (x - panX) / candleSpacing;
        }

        // 4. MASTER RENDER LOOP
        function renderChart() {
            // Clear Canvas
            const isLightMode = document.body.classList.contains('light-theme');
            ctx.fillStyle = isLightMode ? '#ffffff' : '#020202';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(candles.length === 0) return;

            // Calculate Min/Max Price for VISIBLE candles to dynamically scale Y-Axis
            priceMin = Infinity;
            priceMax = -Infinity;
            
            candles.forEach(c => {
                let cx = indexToX(c.xIndex);
                if (cx > -50 && cx < canvas.width - rightMargin + 50) {
                    if (c.high > priceMax) priceMax = c.high;
                    if (c.low < priceMin) priceMin = c.low;
                }
            });

            // Add margin to min/max so candles don't touch edges
            const buffer = (priceMax - priceMin) * 0.1;
            priceMax += buffer;
            priceMin -= buffer;

            // Draw Background Grid
            ctx.strokeStyle = isLightMode ? '#e2e8f0' : '#111111';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // Horizontal grid based on price scale
            let priceStep = (priceMax - priceMin) / 5;
            for(let i=1; i<=5; i++) {
                let p = priceMin + (i * priceStep);
                let y = priceToY(p);
                ctx.moveTo(0, y); ctx.lineTo(canvas.width - rightMargin, y);
            }
            // Vertical grid based on arbitrary spacing
            for(let i = 0; i < canvas.width - rightMargin; i += 100) { 
                ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); 
            }
            ctx.stroke();

            // Draw Candles
            candles.forEach(c => {
                let cx = indexToX(c.xIndex);
                // Optimization: Don't draw if off-screen
                if (cx < -20 || cx > canvas.width - rightMargin + 20) return;

                let isUp = c.close >= c.open;
                ctx.strokeStyle = isUp ? '#00ff88' : '#ff4444';
                ctx.fillStyle = isUp ? '#00ff88' : '#ff4444';
                ctx.lineWidth = 2;

                // Wick
                ctx.beginPath();
                ctx.moveTo(cx, priceToY(c.high));
                ctx.lineTo(cx, priceToY(c.low));
                ctx.stroke();

                // Body
                let bodyTop = priceToY(Math.max(c.open, c.close));
                let bodyBottom = priceToY(Math.min(c.open, c.close));
                let bodyHeight = bodyBottom - bodyTop;
                
                ctx.fillRect(cx - (candleWidth/2), bodyTop, candleWidth, Math.max(bodyHeight, 2));
            });

            // Draw Price Axis (Right Side)
            ctx.fillStyle = isLightMode ? '#f1f5f9' : '#0a0a0a';
            ctx.fillRect(canvas.width - rightMargin, 0, rightMargin, canvas.height);
            ctx.beginPath();
            ctx.moveTo(canvas.width - rightMargin, 0);
            ctx.lineTo(canvas.width - rightMargin, canvas.height);
            ctx.strokeStyle = isLightMode ? '#cbd5e1' : '#131313';
            ctx.stroke();

            // Price Labels on Axis
            ctx.fillStyle = isLightMode ? '#64748b' : '#777777';
            ctx.font = "11px monospace";
            for(let i=1; i<=5; i++) {
                let p = priceMin + (i * priceStep);
                let y = priceToY(p);
                ctx.fillText(p.toFixed(2), canvas.width - rightMargin + 10, y + 4);
            }

            // Current Live Price Badge
            let currentPrice = candles[candles.length-1].close;
            let currentY = priceToY(currentPrice);
            ctx.fillStyle = candles[candles.length-1].close >= candles[candles.length-1].open ? '#00ff88' : '#ff4444';
            ctx.fillRect(canvas.width - rightMargin, currentY - 10, rightMargin, 20);
            ctx.fillStyle = '#000000';
            ctx.font = "bold 12px monospace";
            ctx.fillText(currentPrice.toFixed(2), canvas.width - rightMargin + 10, currentY + 4);
            
            // Draw current price line across chart
            ctx.beginPath();
            ctx.setLineDash([2, 2]);
            ctx.moveTo(0, currentY);
            ctx.lineTo(canvas.width - rightMargin, currentY);
            ctx.strokeStyle = ctx.fillStyle; // Use green/red
            ctx.stroke();
            ctx.setLineDash([]); // reset

            // Draw Completed Tools/Shapes
            drawings.forEach(shape => drawShape(shape));

            // Draw Active Shape
            if (activeDrawing) drawShape(activeDrawing);
        }

        function drawShape(shape) {
            ctx.lineWidth = shape.thickness || 2;
            ctx.strokeStyle = shape.color || '#d4af37'; 
            
            // Map shape mathematical coordinates back to screen pixels
            let sx = indexToX(shape.startIndex);
            let sy = priceToY(shape.startPrice);
            let ex = shape.endIndex ? indexToX(shape.endIndex) : sx;
            let ey = shape.endPrice ? priceToY(shape.endPrice) : sy;

            // Don't draw over price scale
            ctx.save();
            ctx.rect(0, 0, canvas.width - rightMargin, canvas.height);
            ctx.clip();

            if (shape.type === 'line') {
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
            } else if (shape.type === 'horzline') {
                ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
            } else if (shape.type === 'rect') {
                let r = parseInt(shape.color.slice(1, 3), 16), g = parseInt(shape.color.slice(3, 5), 16), b = parseInt(shape.color.slice(5, 7), 16);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.1)`; 
                ctx.fillRect(sx, sy, ex - sx, ey - sy);
                ctx.strokeRect(sx, sy, ex - sx, ey - sy);
            }
            
            ctx.restore();
        }

        // --- MOUSE INTERACTIONS (Panning & Drawing mapped to Math) ---
        
        function selectTool(toolName) {
            currentTool = toolName;
            document.querySelectorAll('.tv-left-tool-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('tool-' + toolName);
            if(activeBtn) activeBtn.classList.add('active');
            
            container.style.cursor = toolName === 'cursor' ? 'grab' : 'crosshair';
        }

        function clearCanvasDrawings() {
            drawings = [];
            renderChart();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Ignore clicks on price scale
            if (mouseX > canvas.width - rightMargin) return;

            isDragging = true;
            lastMouseX = mouseX;

            if (currentTool === 'cursor') {
                container.style.cursor = 'grabbing';
                return;
            }

            // Math: Calculate real price and time index from pixels
            let targetPrice = yToPrice(mouseY);
            let targetIndex = xToIndex(mouseX);
            
            const color = document.getElementById('topbar-color').value;
            const thickness = document.getElementById('topbar-thickness').value;

            if (currentTool === 'horzline') {
                drawings.push({ type: 'horzline', startPrice: targetPrice, startIndex: targetIndex, color, thickness });
                renderChart();
                return;
            }

            // Start drag drawing
            if (currentTool === 'trendline') {
                activeDrawing = { type: 'line', startPrice: targetPrice, startIndex: targetIndex, endPrice: targetPrice, endIndex: targetIndex, color, thickness };
            } else if (currentTool === 'rectangle') {
                activeDrawing = { type: 'rect', startPrice: targetPrice, startIndex: targetIndex, endPrice: targetPrice, endIndex: targetIndex, color, thickness };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (currentTool === 'cursor') {
                // PAN THE CHART
                let deltaX = mouseX - lastMouseX;
                panX += deltaX;
                lastMouseX = mouseX;
            } else if (activeDrawing) {
                // UPDATE DRAWING MATH COORDINATES
                activeDrawing.endPrice = yToPrice(mouseY);
                activeDrawing.endIndex = xToIndex(mouseX);
            }
            
            renderChart();
        });

        canvas.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            if (currentTool === 'cursor') {
                container.style.cursor = 'grab';
            }
            if (activeDrawing) {
                drawings.push(activeDrawing);
                activeDrawing = null;
            }
        });

        // --- INITIALIZATION ---
        function resizeCanvas() {
            // Deal with high DPI displays for crisp rendering
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            renderChart();
        }

        window.addEventListener('resize', resizeCanvas);
        
        // Boot Sequence
        setTimeout(() => {
            generateHistoricalData();
            resizeCanvas();
            startLiveSimulation(); // Start the live heartbeat
        }, 100);

    </script>
</body>
