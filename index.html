<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Arjun Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; height: 100vh; background-color: #0b0e14; color: #fff; }
        
        /* Sidebar Styling */
        .sidebar { width: 250px; background: #151a22; padding: 20px; border-right: 1px solid #262f3c; }
        .sidebar h2 { color: #00ff88; margin-bottom: 30px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 15px 0; border-bottom: 1px solid #262f3c; cursor: pointer; }

        /* Main Content Styling */
        .main-content { flex: 1; padding: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #151a22; padding: 20px; border-radius: 8px; border: 1px solid #262f3c; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Fx Arjun</h2>
        <ul>
            <li>Dashboard</li>
            <li>Markets</li>
            <li>Wallet</li>
            <li>Settings</li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Welcome, Trader</h1>
        <div class="stats-grid">
            <div class="card"><h3>Balance</h3><p>$10,500.00</p></div>
            <div class="card"><h3>Profit</h3><p>+$450.20</p></div>
            <div class="card"><h3>Active Trades</h3><p>3</p></div>
        </div>
    </div>
</body>
</html>
