<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX_ARJUN | V6.0 NATIVE MASTER TERMINAL</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --sidebar: #050505; --border: #1a1a1a; --gold: #d4af37; --green: #089981; --red: #f23645; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 60px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .nav-btn { width: 40px; height: 40px; margin-bottom: 15px; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 6px; }
        .nav-btn.active { color: var(--gold); background: #111; }

        /* Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        
        /* Chart Area */
        .chart-container { flex: 1; position: relative; }
        #chart { width: 100%; height: 100%; }

        /* Custom Left Tool Bar */
        .tools { position: absolute; left: 0; top: 0; width: 40px; height: 100%; background: #0a0a0a; border-right: 1px solid var(--border); z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
        .tool { color: #888; margin-bottom: 15px; cursor: pointer; }
        .tool:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-btn active"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-btn"><i class="fa-solid fa-microchip"></i></div>
    </div>
    
    <div class="workspace">
        <div class="top-bar">
            <h2 style="color:var(--gold);">XAUUSD</h2>
            <button onclick="document.getElementById('mtj-modal').style.display='flex'">VIEW MTJ DASHBOARD</button>
        </div>
        <div class="chart-container">
            <div class="tools">
                <div class="tool" onclick="alert('Drawing Trendline...')"><i class="fa-solid fa-minus" style="transform: rotate(-45deg);"></i></div>
                <div class="tool" onclick="alert('Drawing Rectangle...')"><i class="fa-regular fa-square"></i></div>
            </div>
            <div id="chart"></div>
        </div>
    </div>

    <div id="mtj-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; justify-content:center; align-items:center;">
        <div style="background:#111; padding:40px; border-radius:10px; width:600px;">
            <h1 style="color:var(--gold);">MY TRADING JOURNEY</h1>
            <p>Stats and Radar Charts go here.</p>
            <button onclick="document.getElementById('mtj-modal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#030303', textColor: '#ccc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } }
        });
        const series = chart.addCandlestickSeries({ upColor: '#089981', downColor: '#f23645' });
        
        // Initial Data
        series.setData([
            {time: '2026-06-01', open: 2320, high: 2325, low: 2315, close: 2322},
            {time: '2026-06-02', open: 2322, high: 2330, low: 2320, close: 2328}
        ]);
    </script>
</body>
</html>
